services:
  maze-sales-tracker:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      # Servimos SOLO el index.html (no exponemos .git, .planning, README, etc.)
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.maze-sales-tracker.rule=Host(`sales-tracker.mazefunnels.io`)
      - traefik.http.routers.maze-sales-tracker.entrypoints=websecure
      - traefik.http.routers.maze-sales-tracker.tls.certresolver=letsencrypt
      - traefik.http.services.maze-sales-tracker.loadbalancer.server.port=80

networks:
  traefik-public:
    external: true
