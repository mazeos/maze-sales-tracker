services:
  maze-sales-tracker-dev:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      # traefik-public: expuesta al reverse-proxy. default: red interna para hablar con `api`.
      - traefik-public
      - default
    labels:
      - traefik.enable=true
      - traefik.http.routers.maze-sales-tracker-dev.rule=Host(`sales-tracker-test.mazefunnels.io`)
      - traefik.http.routers.maze-sales-tracker-dev.entrypoints=websecure
      - traefik.http.routers.maze-sales-tracker-dev.tls.certresolver=letsencrypt
      - traefik.http.services.maze-sales-tracker-dev.loadbalancer.server.port=80

  # Mini-API de provisioning de miembros. Interna: solo la alcanza nginx por DNS (`api`).
  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    networks:
      - default

networks:
  traefik-public:
    external: true
  default:
