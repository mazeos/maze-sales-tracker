<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Sales Tracker IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --onyx:#0B0B0F; --surface:#131319; --surface-2:#1A1A22; --line:#26262F;
    --ink:#F3F3F0; --muted:#8B8B99; --faint:#86868F;
    --lima:#C5FF49; --lima-dim:#8FB833; --lime-ink:#C5FF49; --on-accent:#0B0B0F; --danger:#F2555A; --amber:#F5B14C; --violet:#6C5CE7;
    --r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--onyx);color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(900px 600px at 88% -8%, rgba(108,92,231,.16), transparent 60%),
      radial-gradient(700px 500px at 6% 4%, rgba(197,255,73,.06), transparent 55%),
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,.35), transparent),
      radial-gradient(1px 1px at 45% 60%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 82% 48%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 33% 82%, rgba(255,255,255,.25), transparent),
      radial-gradient(1px 1px at 92% 74%, rgba(255,255,255,.3), transparent)}
  .app{position:relative;z-index:1;display:grid;grid-template-columns:74px 1fr;min-height:100vh}
  body.has-super-banner .app{padding-top:38px}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}

  /* rail */
  .rail{border-right:1px solid var(--line);padding:22px 0;display:flex;flex-direction:column;align-items:center;gap:6px;position:sticky;top:0;height:100vh}
  .brand{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:radial-gradient(circle at 30% 25%, #1f2415, #0e0e12);border:1px solid #2c3320;margin-bottom:16px}
  .brand svg{width:22px;height:22px}
  .nav-i{width:44px;height:44px;border-radius:11px;display:grid;place-items:center;color:var(--muted);transition:.18s;position:relative}
  .nav-i svg{width:20px;height:20px;display:block}
  .nav-i:hover{color:var(--ink);background:var(--surface)}
  .nav-i.on{color:var(--on-accent);background:var(--lima)}
  .nav-i .tt{position:absolute;left:52px;top:50%;transform:translateY(-50%);background:var(--surface-2);border:1px solid var(--line);color:var(--ink);font-size:12px;padding:4px 9px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;transition:.15s;z-index:20}
  .nav-i:hover .tt{opacity:1}
  .rail .spacer{flex:1}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2a2f1a,#454f28);border:1px solid #3a4326;display:grid;place-items:center;font-weight:700;font-size:13px;color:var(--lime-ink)}

  .main{padding:24px 32px 70px;max-width:1340px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .agency{display:flex;align-items:center;gap:12px}
  .agency h1{font-family:'Fraunces',serif;font-weight:500;font-size:22px;letter-spacing:-.01em}
  .agency .sub{color:var(--muted);font-size:12.5px;margin-top:1px}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:100px;border:1px solid var(--line);color:var(--muted)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--lima);box-shadow:0 0 8px var(--lima)}
  .controls{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);color:var(--ink);padding:8px 12px;border-radius:10px;font-size:13px;font-weight:500;transition:.18s}
  .chip:hover{border-color:#39394a}
  .chip .k{color:var(--muted);font-size:11.5px}
  .chip.primary{background:var(--lima);color:var(--on-accent);border-color:var(--lime-ink);font-weight:600}
  .chip.icon{padding:8px 11px}
  select.chip{-webkit-appearance:none;appearance:none;padding-right:26px;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238B8B99' stroke-width='1.5'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}

  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  h2.view{font-family:'Fraunces',serif;font-weight:500;font-size:24px;letter-spacing:-.01em;margin:2px 0 18px}

  /* hero funnel */
  .hero{background:linear-gradient(180deg, rgba(26,26,34,.7), rgba(19,19,25,.7));border:1px solid var(--line);border-radius:20px;padding:22px 24px 12px;margin-bottom:18px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;top:-40%;right:-10%;width:420px;height:420px;background:radial-gradient(circle, rgba(197,255,73,.08), transparent 62%);pointer-events:none}
  .hero-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:14px;flex-wrap:wrap}
  .hero-head h2{font-family:'Fraunces',serif;font-weight:500;font-size:19px;letter-spacing:-.01em;margin-top:5px}
  .hero-head .lead{color:var(--muted);font-size:12.5px;max-width:360px}
  .hero-kpis{display:flex;gap:24px}
  .hk .l{font-size:11.5px;color:var(--muted);margin-bottom:3px}
  .hk .v{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:19px;letter-spacing:-.02em}
  .hk .v small{font-size:12px;color:var(--muted);font-weight:400}

  .funnel{display:grid;gap:0;align-items:end;height:200px;position:relative;padding-top:8px}
  .stage{position:relative;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%;padding:0 5px}
  .stage .bar{width:100%;max-width:64px;border-radius:8px 8px 0 0;position:relative;background:linear-gradient(180deg, rgba(197,255,73,.55), rgba(197,255,73,.10));border:1px solid rgba(197,255,73,.30);border-bottom:none;transition:height .4s}
  .stage.cash .bar{background:linear-gradient(180deg,rgba(197,255,73,.9),rgba(197,255,73,.3));border-color:var(--lime-ink)}
  .stage .node{position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:9px;height:9px;border-radius:50%;background:var(--lima);box-shadow:0 0 10px rgba(197,255,73,.8);z-index:3}
  .stage .cnt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;margin-top:10px;letter-spacing:-.02em}
  .stage.cash .cnt{color:var(--lime-ink)}
  .stage .lbl{font-size:10.5px;color:var(--muted);text-align:center;margin-top:2px;line-height:1.25}
  .conv{position:absolute;top:44%;right:-1px;z-index:4;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:2px 5px;white-space:nowrap}
  .conv.bad{color:var(--danger);border-color:rgba(242,85,90,.4)}
  .conv.good{color:var(--lime-ink);border-color:rgba(197,255,73,.35)}
  .tip{border-bottom:1px dotted var(--faint);cursor:help}

  .row{display:grid;grid-template-columns:1.05fr 1.35fr 1.15fr;gap:18px;align-items:stretch;margin-bottom:18px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 19px}
  .card h3{font-size:13px;font-weight:600}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}

  .pace{margin-bottom:16px}
  .pace:last-child{margin-bottom:0}
  .pace-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px}
  .pace-top .name{font-size:13px;font-weight:500}
  .pace-top .val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
  .pace-top .val span{color:var(--muted);font-weight:400;font-size:12px}
  .track{height:9px;border-radius:100px;background:var(--surface-2);position:relative;overflow:hidden}
  .fill{position:absolute;left:0;top:0;bottom:0;border-radius:100px;background:linear-gradient(90deg,var(--lima-dim),var(--lima));transition:width .4s}
  .goalmark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);opacity:.55}
  .pace-foot{display:flex;align-items:center;gap:7px;margin-top:7px;font-size:12px}
  .tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px}
  .tag.ok{color:var(--lime-ink);background:rgba(197,255,73,.10)}
  .tag.warn{color:var(--amber);background:rgba(245,177,76,.10)}
  .tag.bad{color:var(--danger);background:rgba(242,85,90,.10)}
  .empty{color:var(--faint);font-size:12.5px;padding:6px 0}
  .admin-lock{display:flex;gap:9px;align-items:flex-start;background:rgba(245,177,76,.10);border:1px solid rgba(245,177,76,.35);color:var(--amber);font-size:12.5px;line-height:1.45;padding:10px 13px;border-radius:11px;margin-bottom:16px}

  .reps{display:flex;flex-direction:column;gap:10px}
  .rep{display:grid;grid-template-columns:36px 1fr auto;gap:12px;align-items:center;padding:11px;border:1px solid var(--line);border-radius:11px;background:var(--surface-2)}
  .rep .rav{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-weight:700;font-size:14px}
  .rep.setter .rav{background:rgba(108,92,231,.16);color:#a99bff}
  .rep.triage .rav{background:rgba(245,177,76,.14);color:var(--amber)}
  .rep.closer .rav{background:rgba(197,255,73,.14);color:var(--lime-ink)}
  .rep .who{font-size:13.5px;font-weight:600}
  .rep .role{font-size:11px;color:var(--muted);text-transform:capitalize}
  .rep .kpis{display:flex;gap:16px;text-align:right}
  .rep .kpi .n{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
  .rep .kpi .t{font-size:10px;color:var(--muted)}
  .rep .kpi .n.warn{color:var(--amber)} .rep .kpi .n.bad{color:var(--danger)} .rep .kpi .n.good{color:var(--lime-ink)}

  .coach{background:linear-gradient(180deg, rgba(26,30,16,.5), rgba(19,19,25,.6));border:1px solid rgba(197,255,73,.22);border-radius:var(--r);padding:18px 19px}
  .coach .ch{display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .coach .spark{width:26px;height:26px;border-radius:8px;background:var(--lima);display:grid;place-items:center;flex:none}
  .coach .spark svg{width:15px;height:15px}
  .coach .ch .t{font-size:13px;font-weight:600}
  .coach .ch .s{font-size:11px;color:var(--lima-dim);font-weight:500}
  .coach p{font-size:13px;line-height:1.6;color:#DEDED8;margin-bottom:11px}
  .coach b{color:var(--ink);font-weight:600}.coach .hl{color:var(--lime-ink);font-weight:600}
  .coach .rec{background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;display:flex;gap:9px;align-items:flex-start}
  .coach .rec .arw{color:var(--lime-ink);font-weight:700;flex:none}
  .coach .foot{display:flex;align-items:center;gap:6px;margin-top:11px;font-size:11px;color:var(--faint)}

  /* rollup table */
  .rollup{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 19px;overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:right;padding:9px 10px;font-size:13px;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  thead th{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--line)}
  tbody td{border-bottom:1px solid #1e1e26;font-family:'JetBrains Mono',monospace;font-weight:500}
  tbody td:first-child{font-family:'Hanken Grotesk';font-weight:600}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:rgba(255,255,255,.015)}

  /* capture */
  .cap-wrap{max-width:560px}
  .cap-controls{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .taps{display:flex;flex-direction:column;gap:9px}
  .tap{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 13px;transition:.15s}
  .tap:hover{border-color:#33333f}
  .tap .tl{font-size:13.5px;font-weight:500}
  .tap .tl .def{color:var(--faint);font-size:11.5px;font-weight:400;margin-top:1px}
  .tap .tr{display:flex;align-items:center;gap:9px}
  .tap .num{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;min-width:38px;text-align:right}
  .step{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:19px;font-weight:700;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);transition:.12s}
  .step:hover{border-color:#44444f}
  .step.plus{background:var(--lima);color:var(--on-accent);border-color:var(--lime-ink)}
  .step.plus:active{transform:scale(.9)}
  .cap-save{margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:12.5px;color:var(--muted)}
  .cap-save b{color:var(--lime-ink)}
  .money-in{width:120px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;color:var(--ink);font-family:'JetBrains Mono',monospace;font-size:14px;text-align:right}

  /* forms / lists */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12px;color:var(--muted);font-weight:500}
  .inp{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--ink);font-size:14px;width:100%}
  .inp:focus{outline:none;border-color:var(--lima-dim)}
  .inp:disabled{opacity:.4;cursor:not-allowed}
  /* móvil: instructivo compacto (expandible al tocarlo), tooltips del rail ocultos */
  @media(max-width:520px){
    .cap-intro p{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
    .cap-intro.open p{display:block;-webkit-line-clamp:unset}
    .nav-i .tt{display:none}
  }
  /* foco de teclado en la navegación */
  .nav-i:focus-visible{outline:2px solid var(--lima);outline-offset:2px}

  .btn{background:var(--lima);color:var(--on-accent);border:none;border-radius:10px;padding:10px 16px;font-weight:600;font-size:14px}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn.sm{padding:7px 12px;font-size:13px}
  .btn.danger{background:transparent;border:1px solid rgba(242,85,90,.4);color:var(--danger)}
  .list{display:flex;flex-direction:column;gap:9px}
  .li{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
  .li .who{font-size:14px;font-weight:600}

  /* combobox — buscador de subcuentas (Plataforma). Solo tokens: sirve en ambos temas */
  .cbx-wrap{position:relative}
  .cbx-panel{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:60;max-height:320px;overflow-y:auto;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 32px rgba(0,0,0,.35);padding:6px}
  .cbx-head{font-size:11.5px;color:var(--muted);padding:6px 10px 8px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .cbx-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;border:1px solid transparent}
  .cbx-item.hl{background:var(--surface);border-color:var(--lima)}
  .cbx-item.off{opacity:.45;cursor:default}
  .cbx-ava{width:28px;height:28px;border-radius:50%;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--ink);flex:none}
  .cbx-name{font-size:13.5px;font-weight:600;color:var(--ink)}
  .cbx-meta{font-size:11.5px;color:var(--muted)}
  .cbx-badge{margin-left:auto;font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:100px;padding:2px 8px;white-space:nowrap}
  .pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;text-transform:capitalize}
  .pill.setter{background:rgba(108,92,231,.16);color:#a99bff}
  .pill.triage{background:rgba(245,177,76,.14);color:var(--amber)}
  .pill.closer{background:rgba(197,255,73,.14);color:var(--lime-ink)}

  /* chips de estado — Equipo desde HighLevel */
  .pill.st-nuevo{background:rgba(108,92,231,.16);color:#a99bff}
  .pill.st-vinculable{background:rgba(245,177,76,.14);color:var(--amber)}
  .pill.st-importado{background:rgba(197,255,73,.14);color:var(--lime-ink)}
  .pill.st-inactivo{background:rgba(139,139,153,.16);color:var(--muted)}
  .ghl-code{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;flex-wrap:wrap}
  .ghl-code-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px;letter-spacing:.03em;color:var(--lime-ink)}
  .ghl-code-txt{color:var(--muted);font-size:12.5px;margin-top:5px;max-width:520px}
  .ghl-ok{color:var(--lime-ink);font-weight:700;font-size:15px}

  .section{margin-bottom:22px}
  .cuo-est{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:rgba(127,127,127,.14);color:var(--muted);white-space:nowrap}
  .ghl-badge{font-size:9px;font-weight:700;letter-spacing:.04em;padding:1px 6px;border-radius:10px;background:rgba(197,255,73,.16);color:var(--lime-ink,#C5FF49);margin-left:6px;vertical-align:middle}
  .cuo-est.venc{background:rgba(255,77,77,.14);color:#ff6b6b}
  .cuo-est.paga{background:rgba(74,222,128,.14);color:#4ade80}
  .section .eyebrow{margin-bottom:12px}
  .cards-mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .mini{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 15px}
  .mini .l{font-size:11.5px;color:var(--muted);margin-bottom:5px}
  .mini .v{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-.02em}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--lima);color:var(--on-accent);font-weight:600;font-size:13px;padding:10px 18px;border-radius:100px;opacity:0;transition:.25s;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .footnote{margin-top:36px;padding-top:18px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;color:var(--faint);font-size:12px;flex-wrap:wrap}
  .footnote .dot2{width:6px;height:6px;border-radius:50%;background:var(--faint)}
  .footnote a{color:var(--muted);border-bottom:1px dotted var(--faint)}

  /* tooltips — bubble global sobre body (escapa overflow de contenedores) */
  .tipbox{position:fixed;display:none;background:var(--surface-2);border:1px solid var(--line);color:var(--ink);font-size:12px;line-height:1.45;padding:8px 11px;border-radius:9px;max-width:260px;z-index:9999;box-shadow:0 12px 34px rgba(0,0,0,.5);pointer-events:none}
  [data-tip]{cursor:help}
  .info{display:inline-grid;place-items:center;width:15px;height:15px;border-radius:50%;border:1px solid var(--faint);color:var(--faint);font-size:9.5px;font-weight:700;cursor:help;margin-left:6px;vertical-align:middle;font-style:normal}
  .info:hover{color:var(--lime-ink);border-color:var(--lima-dim)}

  /* capture status + done */
  .cap-intro{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:16px}

  .cap-done{margin-top:16px;display:flex;justify-content:flex-end}

  /* vista tabla (Google Sheets / Airtable) */

  .grid td.tot{position:sticky;right:0;background:var(--surface-2);font-family:'JetBrains Mono';font-weight:700;min-width:66px;z-index:1;padding:7px 9px;color:var(--lime-ink)}

  .grid input.cell::-webkit-outer-spin-button,.grid input.cell::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .grid input.cell:focus{outline:2px solid var(--lima);outline-offset:-2px;background:rgba(197,255,73,.08)}
  .grid input.cell:hover{background:rgba(255,255,255,.03)}
  .grid td.today{background:rgba(197,255,73,.04)}
  .grid tr.drow td{background:rgba(255,255,255,.02);font-family:'JetBrains Mono';color:var(--muted);padding:7px 6px}
  .grid tr.drow .stickyc{color:var(--ink);background:#171720}

  /* ---------- Tema claro ---------- */
  body[data-theme="light"]{
    --onyx:#F5F5EF; --surface:#FFFFFF; --surface-2:#F1F1EA; --line:#E4E4DC;

  body[data-theme="light"] .pill.setter,

  body[data-theme="light"] .tag.warn{background:rgba(245,177,76,.16)}
  body[data-theme="light"] .admin-lock{color:#7d5300;background:rgba(245,177,76,.16)}
  body[data-theme="light"] .tag.bad,
  body[data-theme="light"] .rep .kpi .n.bad,

  body[data-theme="light"] .nav-i{color:var(--muted)}

  /* ---------- Configuraciones (miembros editables) ---------- */
  .cfg-member{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
  .cfg-line1{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

  .cfg-line1 .cfg-role{width:auto}

  .cfg-line2 input{width:72px}
  .cfg-line2 b{color:var(--lime-ink);font-family:'JetBrains Mono';font-weight:700}

  /* ---------- Desglose (drill-down) ---------- */
  .clik{cursor:pointer;transition:.14s;border-radius:5px}
  .clik:hover{color:var(--lime-ink)}

  td.clik:hover{background:rgba(197,255,73,.06)}
  .drill-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:56px 20px;overflow-y:auto}
  .drill{background:var(--surface);border:1px solid var(--line);border-radius:16px;width:100%;max-width:560px;padding:22px 24px;box-shadow:0 30px 90px rgba(0,0,0,.55);position:relative;animation:drillin .17s ease}
  @keyframes drillin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .drill-x{position:absolute;top:15px;right:15px;width:30px;height:30px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);font-size:13px}
  .drill-x:hover{color:var(--ink)}
  .drill-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:8px;padding-right:34px}
  .drill-head h3{font-family:'Fraunces',serif;font-weight:500;font-size:19px;margin-top:2px}
  .drill-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:23px;color:var(--lime-ink);white-space:nowrap}
  .drill-def{color:var(--muted);font-size:13px;margin-bottom:4px}
  .dsec{margin-top:16px}
  .dh{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:9px}
  .dh .hint{text-transform:none;letter-spacing:0;font-weight:400}
  .formula{display:flex;flex-wrap:wrap;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .ftok{font-size:13px;color:var(--muted)} .ftok b{color:var(--ink);font-family:'JetBrains Mono';font-weight:700;margin-right:4px}
  .ftok.tot b{color:var(--lime-ink)}
  .fop{color:var(--faint);font-weight:700}
  table.dtable{width:100%;border-collapse:collapse}
  table.dtable td{padding:8px 6px;border-bottom:1px solid var(--line);font-size:13px}
  table.dtable tr:last-child td{border-bottom:none}
  table.dtable td.v{text-align:right;font-family:'JetBrains Mono';font-weight:600}
  table.dtable td.pctcell{text-align:right;width:52px;color:var(--muted);font-family:'JetBrains Mono'}
  .dtable .rl{font-size:11px;color:var(--faint)}
  .daylist{display:flex;flex-direction:column;gap:5px;max-height:230px;overflow-y:auto}
  .dayrow{display:grid;grid-template-columns:66px 1fr auto;gap:10px;align-items:center;font-size:12.5px}
  .dayrow .dd{color:var(--muted)}
  .dayrow .dbar{height:7px;background:var(--surface-2);border-radius:100px;overflow:hidden}
  .dayrow .dbar span{display:block;height:100%;background:linear-gradient(90deg,var(--lima-dim),var(--lima))}
  .dayrow .dfrac{color:var(--faint);font-family:'JetBrains Mono';font-size:11.5px}
  .dayrow .dv{font-family:'JetBrains Mono';font-weight:700;text-align:right;min-width:44px}

  @media(max-width:960px){
    .app{grid-template-columns:60px 1fr}
    .main{padding:18px 16px 60px}
    .row{grid-template-columns:1fr}
    .grid2{grid-template-columns:1fr}
    .hk{display:none}

  }
</style>

<script>
"use strict";
const SB_URL='https://supabase.mazefunnels.io';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzcyMzIwMDg0LCJleHAiOjIwODc2ODAwODR9.Qdqi7o23mq0aGvzigUzLlVyk9Eo0Sr8vtEmImquTqOw';
const sb=window.supabase.createClient(SB_URL,SB_ANON,{auth:{persistSession:true,autoRefreshToken:true}});
let ME=null, IS_ADMIN=false;
/* ============================================================
   Maze Sales Tracker IA — app funcional (client-side, localStorage)
   Modelo de datos con paridad a la planilla CAMINO DIGITAL.
   ============================================================ */

// ---------- Diccionario de métricas (definiciones embebidas) ----------
const METRICS = {
  setter: [
    {k:'outbound', label:'Outbound', def:'Conversaciones que YO inicié en frío (yo voy a la gente).'},
    {k:'inbound_ig', label:'Inbound IG', def:'Personas que ME escribieron por Instagram.'},

    {k:'seg_ig', label:'Seguimientos IG', def:'Seguimientos hechos por Instagram.'},
    {k:'seg_wpp', label:'Seguimientos Wpp', def:'Seguimientos hechos por WhatsApp.'},
    {k:'outbound_tk', label:'Outbound TikTok', def:'Mensajes en frío que YO inicié por TikTok.'},
    {k:'resp_tk', label:'Respuestas TikTok', def:'Respuestas obtenidas al outbound de TikTok.'},

  ],
  triage: [

  ],
  closer: [
    {k:'disponibilidad', label:'Disponibilidad', def:'Cupos de llamada disponibles hoy en el calendario.'},
    {k:'llamadas', label:'Llamadas', def:'Llamadas tomadas hoy.'},
    {k:'segundas', label:'Segundas llamadas', def:'Segundas llamadas de días anteriores.'},
    {k:'asistencias', label:'Asistencias', def:'Personas que asistieron a la llamada.'},
    {k:'ofertas', label:'Ofertas', def:'Ofertas presentadas (si no calificó, no se presenta).'},
    {k:'cancelados', label:'Cancelados', def:'Llamadas canceladas.'},
    {k:'no_shows', label:'No-shows', def:'No se presentaron a la llamada.'},
    {k:'cierres', label:'Cierres', def:'Ventas cerradas hoy.'},
    {k:'referidos', label:'Referidos', def:'Referidos obtenidos en la llamada.'},
    {k:'cash_nuevo', label:'Cash nuevo ($)', def:'Cash collected líquido nuevo (entró hoy).', money:true},
    {k:'cash_cuotas', label:'Cash cuotas ($)', def:'Cash de cuotas de clientes anteriores.', money:true},
    {k:'reservas', label:'Reservas ($)', def:'Dinero dejado en reserva.', money:true},
    {k:'revenue', label:'Revenue ($)', def:'Facturado hoy (contratos firmados).', money:true},
  ],
};
const ROLE_LABEL = {setter:'Setter', triage:'Triage', closer:'Closer'};
// Mapa modo de equipo → roles permitidos (defensa en profundidad + UX; la seguridad
// real la dan el backend y el trigger DB). 'admin' se maneja aparte (siempre válido).
const MODE_ROLES = {solo:['setter'], sc:['setter','closer'], full:['setter','triage','closer']};
const allowedRoles = (mode) => MODE_ROLES[mode] || MODE_ROLES.full;
const ROLE_MODE_MSG = 'Este rol no está disponible para el modo de equipo de tu agencia.';
const MONTHS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

// ---------- Data layer ----------
const KEY = 'maze_sales_tracker_v1';
let DB = null;

const TZS=[['America/Argentina/Buenos_Aires','Buenos Aires (UTC-3)'],['America/Bogota','Bogotá / Lima (UTC-5)'],['America/Mexico_City','Ciudad de México (UTC-6)'],['America/Caracas','Caracas (UTC-4)'],['America/Santiago','Santiago (UTC-4)'],['America/New_York','Miami / Nueva York (UTC-5)'],['Europe/Madrid','Madrid (UTC+1)']];
function todayStr(){ const tz=(DB&&DB.team&&DB.team.tz)||'America/Argentina/Buenos_Aires'; try{ return new Intl.DateTimeFormat('en-CA',{timeZone:tz}).format(new Date()); }catch(e){ return dstr(new Date()); } }
function dstr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseD(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function uid(){ return 'm'+Math.random().toString(36).slice(2,8); }

function save(){ try{localStorage.setItem(KEY, JSON.stringify(DB));}catch(e){} schedulePush(); }
let _pt;
function schedulePush(){ if(!ME) return; clearTimeout(_pt); _pt=setTimeout(pushToSupabase,600); }
async function pushToSupabase(){
  if(!ME||!DB.team.id) return;
  const rows=[]; for(const k in DB.entries){ const i=k.indexOf('|'); const mid=k.slice(0,i), ds=k.slice(i+1); if(IS_ADMIN||mid===ME.id) rows.push({org_id:DB.team.id,member_id:mid,entry_date:ds,metrics:DB.entries[k]}); }
  if(rows.length){ const {error}=await sb.from('st_entries').upsert(rows,{onConflict:'member_id,entry_date'}); if(error) console.warn('entries',error.message); }
  if(IS_ADMIN){
    await sb.from('st_orgs').update({name:DB.team.name,team_mode:DB.team.mode,tz:DB.team.tz,commission_base:DB.team.commission_base||'contador'}).eq('id',DB.team.id);

// ---------- Períodos ----------
function range(type, ref){
  const r = new Date(ref); let start, end, label;
  if(type==='day'){ start=new Date(r); end=new Date(r); label=fmtDate(r); }
  else if(type==='week'){
    const dow=(r.getDay()+6)%7; start=new Date(r); start.setDate(r.getDate()-dow); end=new Date(start); end.setDate(start.getDate()+6);
    label='Semana · '+fmtDate(start)+'–'+fmtDate(end);
  }
  else if(type==='month'){ start=new Date(r.getFullYear(),r.getMonth(),1); end=new Date(r.getFullYear(),r.getMonth()+1,0); label=MONTHS[r.getMonth()]+' '+r.getFullYear(); }
  else if(type==='quarter'){ const q=Math.floor(r.getMonth()/3); start=new Date(r.getFullYear(),q*3,1); end=new Date(r.getFullYear(),q*3+3,0); label='Q'+(q+1)+' '+r.getFullYear(); }
  else if(type==='year'){ start=new Date(r.getFullYear(),0,1); end=new Date(r.getFullYear(),11,31); label=String(r.getFullYear()); }
  else { start=new Date(2000,0,1); end=new Date(2999,0,1); label='Todo el histórico'; }
  return {start:dstr(start), end:dstr(end), label};
}
function fmtDate(d){ return d.getDate()+' '+MONTHS[d.getMonth()]; }
function shiftRef(type, ref, dir){
  const r=new Date(ref);
  if(type==='day') r.setDate(r.getDate()+dir);
  else if(type==='week') r.setDate(r.getDate()+7*dir);
  else if(type==='month') r.setMonth(r.getMonth()+dir);
  else if(type==='quarter') r.setMonth(r.getMonth()+3*dir);
  else if(type==='year') r.setFullYear(r.getFullYear()+dir);
  return r;
}

// ---------- Agregación ----------
function membersByRole(role){ return DB.members.filter(m=>m.role===role); }
function entriesInRange(memberId, start, end){
  const out=[];
  for(const key in DB.entries){
    const idx=key.indexOf('|'); const mid=key.slice(0,idx), ds=key.slice(idx+1);
    if(mid===memberId && ds>=start && ds<=end) out.push(DB.entries[key]);
  }
  return out;
}
function sumMember(memberId, start, end){
  const acc={};
  entriesInRange(memberId,start,end).forEach(v=>{ for(const k in v){ acc[k]=(acc[k]||0)+(+v[k]||0); } });
  return acc;
}
function sumRole(role, start, end){
  const acc={};
  membersByRole(role).forEach(m=>{ const s=sumMember(m.id,start,end); for(const k in s){ acc[k]=(acc[k]||0)+s[k]; } });
  return acc;
}

function funnel(start, end){
  const s=sumRole('setter',start,end), t=sumRole('triage',start,end), c=sumRole('closer',start,end);
  const conversaciones=(s.outbound||0)+(s.inbound_ig||0)+(s.inbound_wpp_tk||0)+(s.inbound_wpp_ig||0);
  const respuestas=s.respuestas||0;
  const links=(s.links_ig||0)+(s.links_wpp||0);
  const agendados=(s.agend_ig||0)+(s.agend_wpp||0);
  const hasCloser=membersByRole('closer').length>0;
  const asistencias=hasCloser?(c.asistencias||0):(t.asistencias||0);
  const ofertas=c.ofertas||0, cierres=c.cierres||0, cash=c.cash_nuevo||0;
  const stages=[
    {key:'conversaciones',label:'Conversaciones',v:conversaciones,tip:'Outbound + todos los inbound.'},
    {key:'respuestas',label:'Respuestas',v:respuestas,tip:'Respuestas obtenidas.'},
    {key:'links',label:'Links enviados',v:links,tip:'Links de agenda enviados (IG+Wpp).'},
    {key:'agendados',label:'Agendados',v:agendados,tip:'Llamadas agendadas por el setter.'},
    {key:'asistencias',label:'Asistencias',v:asistencias,tip:'Asistencias a las llamadas.'},
    {key:'ofertas',label:'Ofertas',v:ofertas,tip:'Ofertas presentadas (fit del lead).'},
    {key:'cierres',label:'Cierres',v:cierres,tip:'Ventas cerradas.'},
    {key:'cash',label:'Cash',v:cash,money:true,tip:'Cash collected nuevo.'},
  ];
  return {stages, conversaciones, cierres, cash};
}

// ---------- Formato ----------
function money(n){ n=+n||0; if(Math.abs(n)>=1000) return '$'+(n/1000).toFixed(n%1000?1:0).replace('.0','')+'k'; return '$'+Math.round(n); }
function pct(a,b){ if(!b) return null; return Math.round(a/b*100); }
function fmtPct(a,b){ const p=pct(a,b); return p===null?'—':p+'%'; }
function num(n){ return (+n||0).toLocaleString('es'); }

      if(p!==null){ const cls = s.money?'good':(p<35?'bad':(p>=65?'good':'')); const cc=s.money?"drillStage('cash')":`drillConv('${f.stages[i-1].key}','${s.key}')`; conv=`<div class="conv ${cls} clik" onclick="${cc}">${s.money?money(s.v):p+'%'}</div>`; }
    }

      <div class="cnt clik" onclick="drillStage('${s.key}')">${s.money?money(s.v):num(s.v)}</div>

        <div class="lead">Todo se carga como conteo. Las tasas se calculan solas — nunca a mano.</div></div>
      <div class="hero-kpis">
        ${hk('Cash collected', money(f.cash), goalStr('cash_nuevo'), "drillStage('cash')")}

function hk(l,v,sub,click){ return `<div class="hk ${click?'clik':''}" ${click?`onclick="${click}"`:''}><div class="l">${l}</div><div class="v">${v} ${sub?`<small>${sub}</small>`:''}</div></div>`; }
function goalStr(metric){ const g=DB.goals.week&&DB.goals.week[metric]; if(!g) return ''; return '/ '+(metric.indexOf('cash')>=0?money(g):g); }

function pacingCard(){
  const goals = DB.goals.week||{};
  const cw = range('week', parseD(state.ref));
  const f = funnel(cw.start, cw.end);
  const agend = f.stages.find(s=>s.key==='agendados').v;
  const actuals = { cierres:f.cierres, cash_nuevo:f.cash, agendados:agend };
  const elapsed = weekElapsedFrac(cw);
  const keys=[['cierres','Cierres',false],['cash_nuevo','Cash collected',true],['agendados','Agendados',false]];
  let rows='';
  keys.forEach(([k,label,isMoney])=>{
    const goal=goals[k]; if(!goal) return;
    const actual=actuals[k]||0; const pctv=Math.min(100,Math.round(actual/goal*100));
    const expected=goal*elapsed; let tag,txt;
    if(actual>=goal){ tag='<span class="tag ok">Meta superada</span>'; txt='+'+Math.round((actual/goal-1)*100)+'%'; }
    else if(actual>=expected*0.98){ tag='<span class="tag ok">En ritmo</span>'; const proj=actual/Math.max(elapsed,.01); txt='proyección '+(isMoney?money(proj):Math.round(proj)); }
    else { tag='<span class="tag warn">Atrasado</span>'; txt='faltan '+(isMoney?money(goal-actual):(goal-actual)); }
    rows+=`<div class="pace">
      <div class="pace-top"><span class="name">${label}</span><span class="val">${isMoney?money(actual):actual} <span>/ ${isMoney?money(goal):goal}</span></span></div>
      <div class="track"><div class="fill" style="width:${pctv}%"></div><div class="goalmark" style="left:100%"></div></div>
      <div class="pace-foot">${tag}<span style="color:var(--muted)">${txt}</span></div>
    </div>`;
  });
  if(!rows) rows=`<div class="empty">Sin metas cargadas. Definilas en <b>Metas</b>.</div>`;
  return `<div class="card"><div class="card-head"><div><div class="eyebrow">Ritmo</div><h3 style="margin-top:4px">Metas de la semana ${info('Compara lo real contra tu meta y calcula el ritmo: te dice si vas adelantado o atrasado según cuántos días de la semana ya pasaron.')}</h3></div></div>${rows}</div>`;
}
function weekElapsedFrac(cw){
  const t=todayStr(); if(t<cw.start) return 1; if(t>cw.end) return 1;
  const days=(parseD(t)-parseD(cw.start))/86400000 + 1;
  return Math.min(1, days/7);
}
function repsCard(r){
  let rows='';
  DB.members.forEach(m=>{
    const s=sumMember(m.id,r.start,r.end); let kpis='';
    if(m.role==='setter'){
      const links=(s.links_ig||0)+(s.links_wpp||0), agend=(s.agend_ig||0)+(s.agend_wpp||0);
      kpis=kpi(num(agend),'agendados','',`drillRep('${m.id}','agendados')`)+kpi(fmtPct(agend,links),'link→agenda','',`drillRep('${m.id}','linkagenda')`);
    } else if(m.role==='triage'){
      kpis=kpi(fmtPct(s.asistencias,s.agendadas),'asistencia','',`drillRep('${m.id}','asistencia')`)+kpi(num(s.pases),'pases','',`drillRep('${m.id}','pases')`);
    } else {
      const cierrePct=pct(s.cierres,s.ofertas), ocup=pct(s.llamadas,s.disponibilidad);
      kpis=kpi(fmtPct(s.cierres,s.ofertas),'cierre', cierrePct!==null&&cierrePct<30?'bad':'', `drillRep('${m.id}','cierre')`)
          +kpi(fmtPct(s.llamadas,s.disponibilidad),'ocupación', ocup!==null&&ocup>=80?'warn':'', `drillRep('${m.id}','ocupacion')`);
    }
    rows+=`<div class="rep ${m.role}"><div class="rav">${esc(m.name[0]||'?').toUpperCase()}</div>
      <div><div class="who">${esc(m.name)}</div><div class="role">${ROLE_LABEL[m.role]}</div></div>
      <div class="kpis">${kpis}</div></div>`;
  });
  if(!DB.members.length) rows=`<div class="empty">Sin miembros. Agregalos en <b>Equipo</b>.</div>`;
  return `<div class="card"><div class="card-head"><div><div class="eyebrow">Equipo</div><h3 style="margin-top:4px">Rendimiento por persona ${info('Los 2 KPIs clave de cada rol. En ámbar/rojo cuando hay que prestar atención (ej: closer >80% de ocupación, cierre <30%).')}</h3></div><span class="badge" style="border:none;color:var(--faint)">${DB.members.length} activos</span></div><div class="reps">${rows}</div></div>`;
}
function kpi(n,t,cls,click){ return `<div class="kpi ${click?'clik':''}" ${click?`onclick="${click}"`:''}><div class="n ${cls||''}">${n}</div><div class="t">${t}</div></div>`; }

function coachCard(r,f){
  const msg = coachRead(r,f);
  return `<div class="coach">
    <div class="ch"><div class="spark"><svg viewBox="0 0 24 24" fill="#0B0B0F"><path d="M12 2l2.2 6.3L20.5 9l-5 4 1.6 6.5L12 16.2 6.9 19.5 8.5 13l-5-4 6.3-.7z"/></svg></div>
      <div><div class="t">Coach IA</div><div class="s">Lectura del período</div></div></div>
    <p>${msg.p}</p>${msg.rec?`<div class="rec"><span class="arw">→</span><div>${msg.rec}</div></div>`:''}
    <div class="foot">✓ Cada cifra sale de un agregado real — la IA no inventa números</div>
  </div>`;
}
function coachRead(r,f){
  const st=f.stages;
  if(f.conversaciones===0) return {p:'Todavía no hay actividad cargada en este período. Cargá el día en <b>Cargar día</b> y acá aparece la lectura del embudo.',rec:''};
  let worst=null;
  for(let i=1;i<st.length;i++){ if(st[i].money) continue; const prev=st[i-1].v; if(!prev) continue; const p=st[i].v/prev; if(worst===null||p<worst.p) worst={p, from:st[i-1].label, to:st[i].label}; }
  const c=sumRole('closer', r.start, r.end); const ocup=pct(c.llamadas,c.disponibilidad);
  let extra=''; if(ocup!==null && ocup>=80) extra=` El closer está al <b>${ocup}% de ocupación</b> — cerca de saturación.`;
  if(!worst) return {p:'El embudo se ve parejo en este período, sin un cuello de botella marcado.'+extra, rec:''};
  const p = `El cuello de botella del período está en <b>${worst.from} → ${worst.to}</b>: la conversión es de <span class="hl">${Math.round(worst.p*100)}%</span>.${extra}`;
  const rec = `Enfocá en subir la tasa <b>${worst.from} → ${worst.to}</b>. Un +5 pts ahí arrastra todo el embudo y se traduce en más cierres sin más volumen.`;
  return {p, rec};
}

function rollupSection(){
  const ref=parseD(state.ref);
  const rows=[['day','Hoy'],['week','Esta semana'],['month','Este mes'],['quarter','Este trimestre'],['year','Este año']];
  let trs='';
  rows.forEach(([t,label])=>{
    const rr=range(t, ref); const f=funnel(rr.start,rr.end);
    const ag=f.stages.find(s=>s.key==='agendados').v;
    trs+=`<tr><td>${label}</td><td class="clik" onclick="drillCell('${t}','conversaciones')">${num(f.conversaciones)}</td><td class="clik" onclick="drillCell('${t}','agendados')">${num(ag)}</td><td class="clik" onclick="drillCell('${t}','cierres')">${num(f.cierres)}</td><td class="clik" onclick="drillCell('${t}','cash')">${money(f.cash)}</td></tr>`;
  });
  return `<div class="section"><div class="eyebrow">Resumen automático · todos los roles (incluido setter) ${info('Los mismos números sumados por período: hoy, esta semana, este mes, trimestre y año. Se calcula solo — esto en la planilla no estaba automatizado para setters.')}</div>
    <div class="rollup"><table>
      <thead><tr><th>Período</th><th>Conversaciones</th><th>Agendados</th><th>Cierres</th><th>Cash</th></tr></thead>
      <tbody>${trs}</tbody></table></div></div>`;
}

// ---------- Desglose (drill-down): la historia detrás del número ----------
function curPeriod(){ return range(state.ptype, parseD(state.ref)); }
function keyLabels(role){ const m={}; (METRICS[role]||[]).forEach(x=>m[x.k]=x.label); return m; }
const STAGE_SPEC={
  conversaciones:{label:'Conversaciones nuevas',def:'Outbound + todos los inbound del período.',roles:['setter'],keys:['outbound','inbound_ig','inbound_wpp_tk','inbound_wpp_ig']},
  respuestas:{label:'Respuestas',def:'Respuestas obtenidas a los mensajes.',roles:['setter'],keys:['respuestas']},
  links:{label:'Links enviados',def:'Links de agenda enviados (IG + Wpp).',roles:['setter'],keys:['links_ig','links_wpp']},
  agendados:{label:'Agendados',def:'Llamadas agendadas por el setter (IG + Wpp).',roles:['setter'],keys:['agend_ig','agend_wpp']},
  asistencias:{label:'Asistencias',def:'Personas que asistieron a las llamadas.',roles:['closer'],keys:['asistencias']},
  ofertas:{label:'Ofertas',def:'Ofertas presentadas por el closer.',roles:['closer'],keys:['ofertas']},
  cierres:{label:'Cierres',def:'Ventas cerradas.',roles:['closer'],keys:['cierres']},
  cash:{label:'Cash collected',def:'Cash líquido nuevo que entró.',roles:['closer'],keys:['cash_nuevo'],money:true},
};
function _drillMembers(roles, memberId){ if(memberId){ const m=DB.members.find(x=>x.id===memberId); return m?[m]:[]; } return DB.members.filter(m=>roles.indexOf(m.role)>=0); }
function drillAgg(roles, keys, start, end, memberId){
  const members=_drillMembers(roles, memberId); const ids={}; members.forEach(m=>ids[m.id]=1);
  let total=0; const byMember={}, byDay={}, byKey={};
  members.forEach(m=>byMember[m.id]=0); keys.forEach(k=>byKey[k]=0);
  for(const key in DB.entries){ const i=key.indexOf('|'); const mid=key.slice(0,i), ds=key.slice(i+1);
    if(!ids[mid]||ds<start||ds>end) continue;
    let v=0; keys.forEach(k=>{ const kv=(+DB.entries[key][k]||0); v+=kv; byKey[k]+=kv; });
    total+=v; byMember[mid]+=v; byDay[ds]=(byDay[ds]||0)+v; }
  return {total, byMember, byDay, byKey, members};
}
function memberTable(a, isMoney){
  if(a.members.length<=1) return '';
  const rows=a.members.map(m=>({m,v:a.byMember[m.id]||0})).sort((x,y)=>y.v-x.v);
  const tot=rows.reduce((s,r)=>s+r.v,0)||1;
  const tr=rows.map(r=>`<tr><td>${esc(r.m.name)} <span class="rl">${ROLE_LABEL[r.m.role]}</span></td><td class="v">${isMoney?money(r.v):num(r.v)}</td><td class="pctcell">${Math.round(r.v/tot*100)}%</td></tr>`).join('');
  return `<div class="dsec"><div class="dh">Por persona</div><table class="dtable">${tr}</table></div>`;
}
function rateMemberTable(A,B){
  if(A.members.length<=1) return '';
  const tr=A.members.map(m=>{ const a=A.byMember[m.id]||0,b=B.byMember[m.id]||0,p=pct(a,b); return `<tr><td>${esc(m.name)}</td><td class="v">${a} ÷ ${b}</td><td class="pctcell">${p===null?'—':p+'%'}</td></tr>`; }).join('');
  return `<div class="dsec"><div class="dh">Por persona</div><table class="dtable">${tr}</table></div>`;
}
function dayTable(byDay, isMoney){
  const days=Object.keys(byDay).filter(d=>byDay[d]).sort();
  if(!days.length) return `<div class="dsec"><div class="dh">Día por día</div><div class="empty">Sin datos cargados en el período.</div></div>`;
  const max=Math.max.apply(null, days.map(d=>byDay[d]).concat(1));
  const rows=days.map(d=>{ const v=byDay[d], w=Math.round(v/max*100), dd=parseD(d); return `<div class="dayrow"><span class="dd">${dd.getDate()} ${MONTHS[dd.getMonth()]}</span><span class="dbar"><span style="width:${w}%"></span></span><span class="dv">${isMoney?money(v):v}</span></div>`; }).join('');
  return `<div class="dsec"><div class="dh">Día por día <span class="hint">(suman el total)</span></div><div class="daylist">${rows}</div></div>`;
}
function dayTableRate(Ad,Bd){
  const set={}; Object.keys(Ad).forEach(d=>set[d]=1); Object.keys(Bd).forEach(d=>set[d]=1);
  const days=Object.keys(set).filter(d=>(Ad[d]||Bd[d])).sort();
  if(!days.length) return '';
  const rows=days.map(d=>{ const a=Ad[d]||0,b=Bd[d]||0,p=pct(a,b),dd=parseD(d); return `<div class="dayrow"><span class="dd">${dd.getDate()} ${MONTHS[dd.getMonth()]}</span><span class="dfrac">${a} ÷ ${b}</span><span class="dv">${p===null?'·':p+'%'}</span></div>`; }).join('');
  return `<div class="dsec"><div class="dh">Día por día</div><div class="daylist">${rows}</div></div>`;
}
function buildDrill(spec){
  const P=spec.period; let headline, body='';
  if(spec.kind==='sum'){
    const a=drillAgg(spec.roles, spec.keys, P.start, P.end, spec.memberId);
    headline=spec.money?money(a.total):num(a.total);
    if(spec.keys.length>1){
      const L=keyLabels(spec.roles[0]);
      const toks=spec.keys.map(k=>`<span class="ftok"><b>${spec.money?money(a.byKey[k]):a.byKey[k]}</b>${esc(L[k]||k)}</span>`).join('<span class="fop">+</span>');
      body+=`<div class="dsec"><div class="dh">Cómo se forma</div><div class="formula">${toks}<span class="fop">=</span><span class="ftok tot"><b>${headline}</b></span></div></div>`;
    }
    body+=memberTable(a, spec.money)+dayTable(a.byDay, spec.money);
  } else {
    const A=drillAgg(spec.num.roles, spec.num.keys, P.start, P.end, spec.memberId);
    const B=drillAgg(spec.den.roles, spec.den.keys, P.start, P.end, spec.memberId);
    const p=pct(A.total,B.total); headline=p===null?'—':p+'%';
    body+=`<div class="dsec"><div class="dh">Cómo se forma</div><div class="formula"><span class="ftok"><b>${num(A.total)}</b>${esc(spec.num.label)}</span><span class="fop">÷</span><span class="ftok"><b>${num(B.total)}</b>${esc(spec.den.label)}</span><span class="fop">=</span><span class="ftok tot"><b>${headline}</b></span></div></div>`;
    if(!spec.memberId && spec.num.roles.join()===spec.den.roles.join()) body+=rateMemberTable(A,B);
    body+=dayTableRate(A.byDay,B.byDay);
  }
  if(spec.memberId){ const m=DB.members.find(x=>x.id===spec.memberId); if(m && m.role==='closer' && m.commission){
    let baseVal, baseHtml;
    if((DB.team.commission_base||'contador')==='cobrado'){
      const b=closerPayoutBase(m.id,P.start,P.end); baseVal=b.base;
      baseHtml=`<span class="ftok"><b>${money(b.front)}</b>front</span><span class="fop">+</span><span class="ftok"><b>${money(b.back)}</b>back</span>`;
    } else {
      const s=sumMember(m.id,P.start,P.end); baseVal=s.cash_nuevo||0;
      baseHtml=`<span class="ftok"><b>${money(baseVal)}</b>cash</span>`;
    }
    const pay=Math.round(m.commission/100*baseVal);
    body+=`<div class="dsec"><div class="dh">A cobrar (comisión ${m.commission}%)</div><div class="formula">${baseHtml}<span class="fop">×</span><span class="ftok"><b>${m.commission}%</b></span><span class="fop">=</span><span class="ftok tot"><b>${money(pay)}</b></span></div></div>`;
  } }
  return `<div class="drill-head"><div><div class="eyebrow">${esc(P.label)}</div><h3>${esc(spec.label)}</h3></div><div class="drill-val">${headline}</div></div><p class="drill-def">${esc(spec.def||'')}</p>${body}`;
}
function openDrill(spec){
  let ov=document.getElementById('drillOv');
  if(!ov){ ov=document.createElement('div'); ov.id='drillOv'; ov.className='drill-overlay'; ov.addEventListener('click',e=>{ if(e.target===ov) closeDrill(); }); document.body.appendChild(ov); }
  ov.innerHTML=`<div class="drill"><button class="drill-x" onclick="closeDrill()">✕</button>${buildDrill(spec)}</div>`;
  ov.style.display='flex'; document.addEventListener('keydown', drillEsc);
}
function closeDrill(){ const ov=document.getElementById('drillOv'); if(ov) ov.style.display='none'; document.removeEventListener('keydown', drillEsc); }
function drillEsc(e){ if(e.key==='Escape') closeDrill(); }
window.drillStage=(k)=>{ const d=STAGE_SPEC[k]; let roles=d.roles.slice(); if(k==='asistencias' && membersByRole('closer').length===0) roles=['triage']; openDrill({kind:'sum',label:d.label,def:d.def,roles,keys:d.keys,money:d.money,period:curPeriod()}); };

window.drillLead=()=>{ openDrill({kind:'rate',label:'Lead → cierre',def:'Qué % de las conversaciones nuevas termina en cierre.',num:{label:'Cierres',roles:['closer'],keys:['cierres']},den:{label:'Conversaciones',roles:['setter'],keys:['outbound','inbound_ig','inbound_wpp_tk','inbound_wpp_ig']},period:curPeriod()}); };
window.drillCell=(ptype,metric)=>{ const d=STAGE_SPEC[metric]; let roles=d.roles.slice(); if(metric==='asistencias'&&membersByRole('closer').length===0) roles=['triage']; openDrill({kind:'sum',label:d.label,def:d.def,roles,keys:d.keys,money:d.money,period:range(ptype,parseD(state.ref))}); };
window.drillRep=(mid,metric)=>{ const m=DB.members.find(x=>x.id===mid); if(!m) return; const r=m.role;
  const S={
    agendados:{kind:'sum',label:'Agendados — '+m.name,def:'Agendados IG + Wpp de esta persona.',roles:[r],keys:['agend_ig','agend_wpp']},

    ocupacion:{kind:'rate',label:'% Ocupación — '+m.name,def:'Llamadas tomadas ÷ disponibilidad.',num:{label:'Llamadas',roles:[r],keys:['llamadas']},den:{label:'Disponibilidad',roles:[r],keys:['disponibilidad']}},
  }[metric];
  if(!S) return; S.memberId=mid; S.period=curPeriod(); openDrill(S);
};

// ---------- Cargar día ----------
function renderCapture(){
  if(!IS_ADMIN && ME) state.capMember = ME.id;
  if(!state.capMember || !DB.members.find(m=>m.id===state.capMember)) state.capMember = DB.members[0]?DB.members[0].id:null;
  if(!state.capDate) state.capDate = todayStr();
  const member = DB.members.find(m=>m.id===state.capMember);

  if(!member){ body=`<div class="empty">No hay miembros. Andá a <b>Equipo</b> y agregá al menos uno.</div>`; }
  else {
    const memberOpts = (IS_ADMIN?DB.members:DB.members.filter(m=>m.id===ME.id)).map(m=>`<option value="${m.id}" ${state.capMember===m.id?'selected':''}>${esc(m.name)} · ${ROLE_LABEL[m.role]}</option>`).join('');
    const key = state.capMember+'|'+state.capDate;
    const cur = DB.entries[key]||{};
    let taps='';
    METRICS[member.role].forEach(mt=>{
      const val = +cur[mt.k]||0;
      const gb=(state.ghlFill&&state.ghlFill[mt.k])?`<span class="ghl-badge" id="gb_${mt.k}">${state.ghlFill[mt.k]}</span>`:'';
      if(mt.money){
        taps+=`<div class="tap"><div><div class="tl">${mt.label}${gb}</div><div class="def">${mt.def}</div></div>
          <div class="tr"><input class="money-in" type="number" min="0" value="${val}" onchange="setMoney('${mt.k}', this.value)"></div></div>`;
      } else {
        taps+=`<div class="tap"><div><div class="tl">${mt.label}${gb}</div><div class="def">${mt.def}</div></div>
          <div class="tr"><button class="step" onclick="bump('${mt.k}',-1)">−</button><span class="num" id="n_${mt.k}" ondblclick="editNum('${mt.k}')" title="Doble clic para escribir el número">${val}</span><button class="step plus" onclick="bump('${mt.k}',1)">+</button></div></div>`;
      }
    });
    const isToday = state.capDate===todayStr();
    body=`<div class="cap-wrap">
      <div class="cap-intro" onclick="this.classList.toggle('open')">
        <div class="ico">☝</div>
        <p>Tocá <b>+</b> cada vez que pasa algo (una conversación nueva, una respuesta, un link enviado…). <b>No hay botón de guardar</b>: cada toque se guarda solo al instante. Cargá solo lo que uses; el resto dejalo en 0.</p>
      </div>
      <div class="cap-controls">
        <select class="chip" onchange="setCapMember(this.value)" data-tip="De quién estás cargando el día.">${memberOpts}</select>
        <input class="chip inp" style="width:auto" type="date" value="${state.capDate}" max="${todayStr()}" onchange="setCapDate(this.value)" data-tip="Podés cargar o corregir cualquier día pasado.">
        <span class="chip"><span class="k">Rol</span> ${ROLE_LABEL[member.role]}</span>
        <button class="chip" id="ghlFillBtn" onclick="autofillGhl()" data-tip="Trae la data de HighLevel de este día para revisar y guardar. Del closer: citas + ventas. Del setter: conversaciones, inbound, respuestas y agendas.">⚡ Autocompletar</button>
        <span class="savepill" id="savePill">✓ Guardado</span>
      </div>
      <div class="taps">${taps}</div>
      <div class="cap-save"><span>${isToday?'<b style="color:var(--lime-ink)">Hoy</b> · ':''}cada celda se guarda sola</span><span id="capSum">${captureSummary(member,key)}</span></div>
      <div class="cap-done"><button class="btn" onclick="go('dashboard')">Listo · ver el panel →</button></div>
    </div>`;
  }
  VIEW.innerHTML = topbar('') + `<div class="eyebrow">Carga manual</div><h2 class="view">La app <em style="font-family:Fraunces;font-style:italic;color:var(--lime-ink)">es</em> el contador ${info('Reemplaza al contador manual del celular: un toque por evento. La cifra queda limpia y atómica, y las tasas se derivan solas.')}</h2>` + body + footer();
}
function captureSummary(member,key){
  const cur=DB.entries[key]||{};
  if(member.role==='setter'){ const links=(+cur.links_ig||0)+(+cur.links_wpp||0), agend=(+cur.agend_ig||0)+(+cur.agend_wpp||0); return `tasa link→agenda <b>${fmtPct(agend,links)}</b>`; }
  if(member.role==='triage'){ return `asistencia <b>${fmtPct(cur.asistencias,cur.agendadas)}</b>`; }
  return `cierre <b>${fmtPct(cur.cierres,cur.ofertas)}</b>`;
}
window.setCapMember=(id)=>{ state.capMember=id; state.ghlFill=null; renderCapture(); };
window.setCapDate=(d)=>{ state.capDate=d||todayStr(); state.ghlFill=null; renderCapture(); };
// Badge "GHL/Ventas" desaparece apenas el usuario toca el valor a mano.
function clearGhlBadge(k){ if(state.ghlFill&&state.ghlFill[k]){ delete state.ghlFill[k]; const b=document.getElementById('gb_'+k); if(b) b.remove(); } }
// Trae lo certero del día (endpoint /api/capture/ghl) y lo aplica al contador.
// Nada se persiste acá distinto del flujo normal: save() de siempre.
window.autofillGhl=async()=>{
  const btn=document.getElementById('ghlFillBtn'); if(btn){ btn.disabled=true; btn.textContent='Trayendo…'; }
  const fail=(msg)=>{ if(btn){ btn.disabled=false; btn.textContent='⚡ Autocompletar'; } if(msg) toast(msg); };
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ fail('Tu sesión venció, volvé a entrar'); return; }
    const q=new URLSearchParams({date:state.capDate}); if(ME&&state.capMember!==ME.id) q.set('member_id',state.capMember);
    const r=await fetch('/api/capture/ghl?'+q.toString()+superOrgQS(),{headers:{'Authorization':'Bearer '+session.access_token}});
    if(r.status===501){ if(btn) btn.style.display='none'; return; }
    const j=await r.json().catch(()=>null);
    if(!r.ok||!j||!j.metrics){ fail((j&&j.error)||'No se pudo traer de GHL, cargá a mano'); return; }
    const key=state.capMember+'|'+state.capDate;
    if(!DB.entries[key]) DB.entries[key]={};
    state.ghlFill={};
    let n=0;
    for(const k in j.metrics){ DB.entries[key][k]=+j.metrics[k].value||0; state.ghlFill[k]=j.metrics[k].source==='ghl'?'GHL':'Ventas'; n++; }
    save(); renderCapture();
    toast(n?`${n} métricas traídas — revisá y listo, se guardan solas`:'No hay nada certero para traer en este día');
  }catch(e){ fail('No se pudo traer de GHL, cargá a mano'); }
};
function flashSave(){ const p=document.getElementById('savePill'); if(!p) return; p.textContent='✓ Guardado'; p.classList.add('flash'); clearTimeout(flashSave._t); flashSave._t=setTimeout(()=>{p.classList.remove('flash');},700); }
window.bump=(k,dir)=>{
  clearGhlBadge(k);

  if(!DB.entries[key]) DB.entries[key]={};
  const v=Math.max(0,(+DB.entries[key][k]||0)+dir);
  DB.entries[key][k]=v; save();
  const el=document.getElementById('n_'+k); if(el) el.textContent=v;
  const member=DB.members.find(m=>m.id===state.capMember);
  const foot=document.getElementById('capSum'); if(foot&&member) foot.innerHTML=captureSummary(member,key);
  flashSave();
};
window.setNum=(k,val)=>{
  clearGhlBadge(k);
  const key=state.capMember+'|'+state.capDate;
  if(!DB.entries[key]) DB.entries[key]={};
  const v=Math.max(0,Math.round(+val||0));
  DB.entries[key][k]=v; save();
  const el=document.getElementById('n_'+k); if(el) el.textContent=v;
  const member=DB.members.find(m=>m.id===state.capMember);
  const foot=document.getElementById('capSum'); if(foot&&member) foot.innerHTML=captureSummary(member,key);
  flashSave();
};
window.editNum=(k)=>{
  const el=document.getElementById('n_'+k); if(!el||el.querySelector('input')) return;
  const cur=+el.textContent||0;
  const inp=document.createElement('input');
  inp.type='number'; inp.min='0'; inp.value=cur; inp.inputMode='numeric';
  inp.style.cssText='width:66px;font-family:JetBrains Mono,monospace;font-size:18px;font-weight:700;text-align:right;background:var(--surface);color:var(--ink);border:1px solid var(--lima);border-radius:8px;padding:2px 6px;outline:none';
  el.textContent=''; el.appendChild(inp); inp.focus(); inp.select();
  let done=false;
  const commit=()=>{ if(done)return; done=true; setNum(k,Math.max(0,Math.round(+inp.value||0))); };
  const cancel=()=>{ if(done)return; done=true; el.textContent=cur; };

};
window.setMoney=(k,val)=>{

// ---------- Tabla (día por día, estilo Google Sheets / Airtable) ----------

  }

window.bfApply=async(overwrite)=>{

// ---------- Equipo ----------
// Base "cobrado": front = cash+reserva de SUS ventas del rango (por fecha de venta);
// back = cuotas de sus ventas COBRADAS en el rango (por fecha real de cobro, monto real).
function closerPayoutBase(memberId, start, end){
  const front=DB.sales.filter(s=>s.closer===memberId && s.date>=start && s.date<=end)
    .reduce((a,s)=>a+(+s.cash||0)+(+s.reserva||0),0);
  const mySales=new Set(DB.sales.filter(s=>s.closer===memberId).map(s=>s.id));
  const back=(DB.cuotas||[]).filter(c=>c.status==='pagada' && c.paid_date && c.paid_date>=start && c.paid_date<=end && mySales.has(c.sale_id))
    .reduce((a,c)=>a+(+c.paid_amount||0),0);
  return {front, back, base:front+back};
}
function closerPayout(m){
  const r=range('month', parseD(todayStr()));
  if((DB.team.commission_base||'contador')==='cobrado'){
    return Math.round((m.commission||0)/100 * closerPayoutBase(m.id, r.start, r.end).base);
  }
  const s=sumMember(m.id, r.start, r.end);
  return Math.round((m.commission||0)/100 * (s.cash_nuevo||0));
}

// Estado de la conexión GHL de la org (null = todavía no se consultó a la API).
let GHL_STATUS=null, GHL_LOADING=false;
// Flag del retorno OAuth con ?ghl_error=location_mismatch: el admin autorizó
// una subcuenta distinta a la pre-asignada (se muestra banner en ghlCard).
let GHL_MISMATCH=false;
// Calendarios elegibles para "Calendario de llamadas" (null = todavía no se
// consultó; objeto = respuesta del GET {calendars, selected, selected_name, hint?}
// o {error:true, msg} si falló).
let GHL_CALS=null, GHL_CALS_LOADING=false;
async function loadGhlStatus(){
  if(!IS_ADMIN || GHL_LOADING) return;
  GHL_LOADING=true;
  const epoch=ORG_EPOCH; // guardia de época: capturada antes del 1er await
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(epoch!==ORG_EPOCH) return; // cambiamos de org mientras esperábamos la sesión: descartar
    if(!session){ GHL_STATUS={connected:false,error:true}; return; }
    const res=await fetch('/api/integrations/ghl'+(SUPER_HOME?('?org_id='+encodeURIComponent(ME.org_id)):''),{headers:{'Authorization':'Bearer '+session.access_token}});
    const data=await res.json().catch(()=>null);
    if(epoch!==ORG_EPOCH) return; // la org cambió mientras volaba el fetch: es de la org vieja, no pisar la nueva
    GHL_STATUS=(res.ok && data) ? data : {connected:false,error:true};
  }catch(e){ if(epoch===ORG_EPOCH) GHL_STATUS={connected:false,error:true}; }
  finally{ GHL_LOADING=false; if(epoch===ORG_EPOCH && state.view==='team') renderTeam(); }
}
// Carga lazy de los calendarios elegibles (mismo patrón que loadGhlStatus).
async function loadGhlCalendars(){
  if(!IS_ADMIN || GHL_CALS_LOADING) return;
  GHL_CALS_LOADING=true;
  const epoch=ORG_EPOCH;
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(epoch!==ORG_EPOCH) return;
    if(!session){ GHL_CALS={error:true,msg:''}; return; }
    const res=await fetch('/api/ghl/calendars',{headers:{'Authorization':'Bearer '+session.access_token}});
    const data=await res.json().catch(()=>null);
    if(epoch!==ORG_EPOCH) return;
    GHL_CALS=(res.ok && data) ? data : {error:true, msg:(data&&data.error)||''};
  }catch(e){ if(epoch===ORG_EPOCH) GHL_CALS={error:true,msg:''}; }
  finally{ GHL_CALS_LOADING=false; if(epoch===ORG_EPOCH && state.view==='team') renderTeam(); }
}

window.copyGhlAccessCode=async ()=>{
  const code=(GHL_STATUS&&GHL_STATUS.location_id)||'';
  if(!code) return;
  try{
    await navigator.clipboard.writeText(code);
  }catch(e){
    // Fallback para contextos sin Clipboard API (http, browsers viejos).
    const ta=document.createElement('textarea');
    ta.value=code; ta.style.cssText='position:fixed;top:0;left:0;opacity:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand('copy'); }catch(err){}
    document.body.removeChild(ta);
  }
  toast('Código copiado');
};
window.loadGhlUsers=async ()=>{
  if(!IS_ADMIN || GHL_USERS_LOADING) return;
  const epoch=ORG_EPOCH; // guardia de época: capturada antes del 1er await (caso reproducible del hallazgo)
  const { data:{ session } } = await sb.auth.getSession();
  if(epoch!==ORG_EPOCH) return; // volviste/entraste a otra org mientras pedíamos la sesión: descartar
  if(!session){ toast('Tu sesión venció, vuelve a entrar'); return; }
  GHL_USERS_LOADING=true;
  if(state.view==='team') renderTeam();
  let res, data;
  try{
    res=await fetch('/api/ghl/users?_=1'+superOrgQS(),{headers:{'Authorization':'Bearer '+session.access_token}});
    data=await res.json().catch(()=>({}));
  }catch(e){
    GHL_USERS_LOADING=false;
    if(epoch===ORG_EPOCH){ toast('No se pudo conectar con el servidor'); if(state.view==='team') renderTeam(); }
    return;
  }
  GHL_USERS_LOADING=false;
  if(epoch!==ORG_EPOCH) return; // la respuesta es de la org vieja (ej: GET a HighLevel tardó y ya volviste a tu equipo): no pisar
  if(res.ok){
    GHL_USERS=data.users||[];
    GHL_REMOVED=data.removed||[];
    GHL_AUTO_LINKED=data.auto_linked||[];
    // Bajas y auto-vinculaciones cambian el equipo local: recargar miembros.
    if(GHL_REMOVED.length || GHL_AUTO_LINKED.length) await loadFromSupabase();
  } else {
    toast(data.error || 'No se pudo cargar la lista de HighLevel');
  }
  if(state.view==='team') renderTeam();
};
window.importGhlUser=async (ghlUserId)=>{

window.submitPassword=async (ev)=>{
  ev.preventDefault();
  const pass=document.getElementById('pw_new').value;
  const conf=document.getElementById('pw_conf').value;
  if(pass.length<8){ toast('La contraseña tiene que tener al menos 8 caracteres'); return false; }
  if(pass!==conf){ toast('Las contraseñas no coinciden'); return false; }
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ toast('Tu sesión venció, vuelve a entrar'); return false; }
  const btn=document.getElementById('pw_btn');
  if(btn){ btn.disabled=true; btn.textContent='Guardando…'; }
  let res, data;
  try{
    res=await fetch('/api/me/password',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},body:JSON.stringify({password:pass})});

    if(btn){ btn.disabled=false; btn.textContent='Guardar'; }
    toast('No se pudo conectar con el servidor');

  if(res.ok){ toast('Contraseña actualizada'); closePasswordModal(); }

// error de red = queda oculto, silencioso (fail-closed; la seguridad real es
// server-side, el rail es solo cosmética).
// PLAT_SETTINGS: respuesta de GET /api/platform/settings — {agency_pit_set,
// agency_pit_hint}. Solo el hint de 4 chars: el token completo jamás llega.
let IS_SUPER=false, PLAT_SETTINGS=null;

// (fail-closed), true = super-admin confirmado por /api/orgs.

// se cierra el box o se navega. La contraseña JAMÁS se persiste ni se loggea.

// invalidación de las globales cacheadas por org. Cada loader que escribe una de esas
// globales captura ORG_EPOCH antes de su primer await y, al volver de cada await,
// descarta la respuesta si ORG_EPOCH ya cambió — así un fetch en vuelo de la org vieja
// nunca pisa el estado de la org nueva. Para un usuario que nunca visita otra org,
// ORG_EPOCH no cambia nunca y el comportamiento es exactamente el de siempre.
let ORG_EPOCH=0;
// Subcuenta elegida en el buscador del form de alta ({id,name} o null) +
// resultados de la última búsqueda (para pickear por índice sin inyectar

// combobox (total server, índice highlighteado, abierto, listener de document).

let PLAT_LOC_TOTAL=0, PLAT_LOC_HL=-1, PLAT_LOC_OPEN=false, _locDocL=null;

// Iniciales de las dos primeras palabras (avatar del combobox); fallback '?'.
function locInitials(name){
  const parts=String(name||'').trim().split(/\s+/).filter(Boolean);
  if(!parts.length) return '?';
  return parts.slice(0,2).map(p=>p[0]).join('').toUpperCase();
}
function locShortId(id){ return String(id||'').slice(0,8); }
async function loadOrgs(){
  if(ORGS_LOADING) return;
  ORGS_LOADING=true;
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ ORGS_ALLOWED=false; return; }
    const res=await fetch('/api/orgs',{headers:{'Authorization':'Bearer '+session.access_token}});
    const data=await res.json().catch(()=>null);
    if(res.ok && data){ ORGS=data.orgs||[]; ORGS_ALLOWED=true; }
    // 401/403 y cualquier otro error → fail-closed, silencioso.
    else{ ORGS_ALLOWED=false; }
  }catch(e){ ORGS_ALLOWED=false; }
  finally{ ORGS_LOADING=false; if(state.view==='platform') renderPlatform(); }
}

// Combobox de subcuentas: el foco abre el panel (q vacío = explorar todas —
// el cache server de 5 min lo hace barato); tipear usa debounce 400ms → GET
// /api/platform/locations?q= → pinta SOLO #platLocResults (nunca re-render
// completo: se pierde el foco del input). Todo dato de GHL pasa por esc()
// antes del innerHTML; click/Enter se resuelven por índice sobre
// PLAT_LOC_RESULTS (jamás se inyectan name/id de GHL en un atributo onclick).
async function platLocFetch(q){
  const box=document.getElementById('platLocResults');
  if(!box) return;
  box.style.display='';
  box.innerHTML=`<div class="empty" style="padding:10px">Buscando…</div>`;
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ toast('Tu sesión venció, vuelve a entrar'); return; }
  let res, data;
  try{
    res=await fetch('/api/platform/locations?q='+encodeURIComponent(q||''),{headers:{'Authorization':'Bearer '+session.access_token}});
    data=await res.json().catch(()=>({}));
  }catch(e){ box.innerHTML=`<div class="empty" style="padding:10px">No se pudo conectar con el servidor</div>`; return; }
  if(!res.ok){
    // 409 = falta configurar el token de agencia: mostrar el error del backend como hint.
    box.innerHTML=`<div class="empty" style="padding:10px">${esc(data.error||'No se pudieron buscar las subcuentas')}</div>`;
    return;
  }
  const locs=data.locations||[];
  PLAT_LOC_TOTAL=data.total ?? locs.length;
  // Vinculadas AL FINAL (estable: libres primero en su orden, vinculadas después).
  // El índice de click/Enter apunta a ESTE array reordenado.
  PLAT_LOC_RESULTS=[...locs.filter(l=>!l.linked_org), ...locs.filter(l=>l.linked_org)];
  PLAT_LOC_HL=PLAT_LOC_RESULTS.findIndex(l=>!l.linked_org); // -1 si no hay seleccionables
  platLocPaint();
}
window.platLocSearch=(q)=>{ clearTimeout(_locT); _locT=setTimeout(()=>platLocFetch(q),400); };
function platLocPaint(){
  const box=document.getElementById('platLocResults');
  if(!box) return;
  box.style.display='';
  if(!PLAT_LOC_RESULTS.length){ box.innerHTML=`<div class="empty" style="padding:10px">No hay subcuentas que coincidan</div>`; return; }
  const n=PLAT_LOC_RESULTS.length;
  const hint=PLAT_LOC_TOTAL>n?' — seguí escribiendo para afinar':'';
  const head=`<div class="cbx-head">Mostrando ${n} de ${PLAT_LOC_TOTAL} subcuentas${hint}</div>`;
  box.innerHTML=head+PLAT_LOC_RESULTS.map((l,i)=>{
    const ava=`<span class="cbx-ava">${esc(locInitials(l.name))}</span>`;
    const meta=[l.city,l.country,locShortId(l.id)].filter(Boolean).join(' · ');
    const col=`<div><div class="cbx-name">${esc(l.name)}</div>${meta?`<div class="cbx-meta">${esc(meta)}</div>`:''}</div>`;
    if(l.linked_org){
      return `<div class="cbx-item off" id="cbxi-${i}">${ava}${col}<span class="cbx-badge">vinculada a ${esc(l.linked_org)}</span></div>`;
    }
    return `<div class="cbx-item${i===PLAT_LOC_HL?' hl':''}" id="cbxi-${i}" role="option" onclick="pickPlatLoc(${i})">${ava}${col}</div>`;
  }).join('');
}
window.platLocFocus=()=>{
  const box=document.getElementById('platLocResults'), inp=document.getElementById('platLocQ');
  if(!box||!inp) return;
  PLAT_LOC_OPEN=true;
  box.style.display='';
  inp.setAttribute('aria-expanded','true');
  platLocFetch(inp.value||''); // sin debounce: explorar de inmediato al foco
  if(!_locDocL){
    _locDocL=(e)=>{ const w=document.getElementById('platLocWrap'); if(!w||!w.contains(e.target)) platLocClose(); };
    document.addEventListener('pointerdown',_locDocL);
  }
};
window.platLocClose=()=>{
  const box=document.getElementById('platLocResults'), inp=document.getElementById('platLocQ');
  if(box) box.style.display='none';
  if(inp) inp.setAttribute('aria-expanded','false');
  PLAT_LOC_OPEN=false; PLAT_LOC_HL=-1;
  // Cleanup obligatorio: nunca acumular listeners entre aperturas/re-renders.
  if(_locDocL){ document.removeEventListener('pointerdown',_locDocL); _locDocL=null; }
};
window.platLocKey=(e)=>{
  if(!PLAT_LOC_OPEN){ if(e.key==='ArrowDown'){ e.preventDefault(); platLocFocus(); } return; }
  if(e.key==='Escape'){ platLocClose(); return; }
  if(e.key==='Enter'){ e.preventDefault(); if(PLAT_LOC_HL>=0) pickPlatLoc(PLAT_LOC_HL); return; }
  if(e.key!=='ArrowDown' && e.key!=='ArrowUp') return;
  e.preventDefault();
  // Las vinculadas están al final: el rango seleccionable es el prefijo [0, lastFree].
  let lastFree=-1;
  for(let i=0;i<PLAT_LOC_RESULTS.length;i++){ if(!PLAT_LOC_RESULTS[i].linked_org) lastFree=i; else break; }
  if(lastFree<0) return;
  if(PLAT_LOC_HL<0) PLAT_LOC_HL=0;
  else if(e.key==='ArrowDown') PLAT_LOC_HL=Math.min(PLAT_LOC_HL+1,lastFree); // tope, sin wrap
  else PLAT_LOC_HL=Math.max(PLAT_LOC_HL-1,0);
  platLocPaint();
  const el=document.getElementById('cbxi-'+PLAT_LOC_HL);
  if(el) el.scrollIntoView({block:'nearest'});
};
window.pickPlatLoc=(i)=>{
  const l=PLAT_LOC_RESULTS[i];
  if(!l || l.linked_org) return;
  PLAT_LOC_SEL={id:l.id, name:l.name};
  platLocClose(); // limpia el listener de document ANTES del re-render (que destruye el panel)
  renderPlatform();
  autofillOrgFromLoc(l.id, l.name); // trae nombre/dueño/email de la subcuenta y prellena el form
};
// Autocompleta nombre de org + nombre/email del admin con la data del dueño de la
// subcuenta (GET /api/platform/location-details). Solo rellena campos vacíos —
// no pisa lo que el super-admin ya haya escrito. Best-effort.
async function autofillOrgFromLoc(id, name){
  const setVal=(elId,val)=>{ const el=document.getElementById(elId); if(el && !el.value && val) el.value=val; };
  setVal('orgName', name); // el nombre del buscador ya sirve; el detalle puede afinarlo
  try{
    const { data:{ session } } = await sb.auth.getSession(); if(!session) return;
    const r=await fetch('/api/platform/location-details?id='+encodeURIComponent(id),{headers:{'Authorization':'Bearer '+session.access_token}});
    if(!r.ok) return;
    const d=await r.json().catch(()=>null); if(!d) return;
    setVal('orgName', d.name||name);
    setVal('orgAdminName', d.owner_name);
    setVal('orgAdminEmail', d.email);
  }catch(e){ /* best-effort: se deja lo que haya */ }
}
window.clearPlatLoc=()=>{ PLAT_LOC_SEL=null; renderPlatform(); };
window.createOrg=async ()=>{
  if(ORG_CREATING) return;
  const name=(document.getElementById('orgName').value||'').trim();
  const adminName=(document.getElementById('orgAdminName').value||'').trim();
  const adminEmail=(document.getElementById('orgAdminEmail').value||'').trim();
  const pass=(document.getElementById('orgAdminPass').value||'').trim();
  if(!name){ toast('Tienes que poner el nombre de la organización'); return; }
  if(!adminName){ toast('Tienes que poner el nombre del admin'); return; }
  if(!adminEmail){ toast('Tienes que poner el email del admin'); return; }
  if(!PLAT_LOC_SEL){ toast('Tenés que vincular una subcuenta de HighLevel'); return; }
  if(pass && pass.length<8){ toast('La contraseña tiene que tener al menos 8 caracteres'); return; }
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ toast('Tu sesión venció, vuelve a entrar'); return; }
  ORG_CREATING=true;
  if(state.view==='platform') renderPlatform();
  const body={name, admin_name:adminName, admin_email:adminEmail};
  if(pass) body.admin_password=pass;
  if(PLAT_LOC_SEL) body.location_id=PLAT_LOC_SEL.id;
  let res, data;

    res=await fetch('/api/orgs',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},body:JSON.stringify(body)});

  }catch(e){
    ORG_CREATING=false;

    return;
  }
  ORG_CREATING=false;

    ORG_CREATED={ name:(data.org&&data.org.name)||name, email:data.admin_email||adminEmail, password:data.admin_password||null, existing:!!data.existing_account };

    if(data.warning){ toast('Organización creada. '+data.warning, 7000); }

    // al refresh porque es estado aparte.
    ORGS=null; ORGS_ALLOWED=null; loadOrgs();
  } else {
    toast(data.error || 'No se pudo crear la organización');
    if(state.view==='platform') renderPlatform();
  }
};
window.copyOrgCreds=async ()=>{
  if(!ORG_CREATED) return;
  const lines=[location.origin, ORG_CREATED.email];
  if(ORG_CREATED.password) lines.push(ORG_CREATED.password);
  const text=lines.join('\n');
  try{
    await navigator.clipboard.writeText(text);
  }catch(e){
    // Fallback para contextos sin Clipboard API (http, browsers viejos).
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.cssText='position:fixed;top:0;left:0;opacity:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand('copy'); }catch(err){}
    document.body.removeChild(ta);
  }
  toast('Credenciales copiadas');
};
window.closeOrgCreds=()=>{ ORG_CREATED=null; if(state.view==='platform') renderPlatform(); };

// HTML del panel: lista de miembros (avatar, email, badges, select de rol,

      const roleSel=`<select class="inp" style="width:auto" onchange="changeMemberRole(${idx}, this.value)">${['admin','setter','triage','closer'].map(r=>`<option value="${r}"${m.role===r?' selected':''}>${r}</option>`).join('')}</select>`;

    </div>

  </div>`;
  const danger=`<div style="border-top:1px solid var(--line);padding-top:10px;margin-top:14px">
    <b style="font-size:13px;display:block;margin:0 0 6px;color:var(--danger)">Zona de peligro</b>

// PATCH genérico de un miembro del panel. Ante error (p.ej. 400 "sin admin")
// NO se muta PLAT_MEMBERS: el re-render revierte el select/estado anterior.
async function patchPanelMember(idx, patch, okMsg, failMsg){
  const m=PLAT_MEMBERS&&PLAT_MEMBERS[idx];
  if(!m||!PLAT_M_ORG) return;
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ toast('Tu sesión venció, vuelve a entrar'); return; }
  let res, data;
  try{
    res=await fetch('/api/orgs/'+encodeURIComponent(PLAT_M_ORG)+'/members/'+encodeURIComponent(m.id),{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},body:JSON.stringify(patch)});
    data=await res.json().catch(()=>({}));
  }catch(e){
    toast('No se pudo conectar con el servidor');
    if(state.view==='platform') renderPlatform();
    return;
  }
  if(res.ok){
    if(patch.role!==undefined) m.role=patch.role;
    if(patch.active!==undefined) m.active=patch.active;
    toast(okMsg);
    // Refrescar panel (emails/estado frescos) + tabla (contador de miembros).
    loadOrgMembers();
    ORGS=null; ORGS_ALLOWED=null; loadOrgs();
  } else {
    toast(data.error||failMsg);
    if(state.view==='platform') renderPlatform(); // revierte el select/estado
  }
}
window.changeMemberRole=(idx, role)=>patchPanelMember(idx,{role},'Rol actualizado','No se pudo cambiar el rol');
window.toggleMemberActive=(idx)=>{
  const m=PLAT_MEMBERS&&PLAT_MEMBERS[idx];
  if(!m) return;
  const activar=m.active===false;
  if(!activar && !confirm('¿Desactivar a este miembro? No va a poder entrar.')) return;
  return patchPanelMember(idx,{active:activar},activar?'Miembro reactivado':'Miembro desactivado','No se pudo actualizar al miembro');
};
// ---------- Eliminar organización (SOLO super-admins) ----------
// Modal lazy patrón pwOv: confirmación fuerte escribiendo el nombre EXACTO de

// ---------- Vista Plataforma (renderPlatform) ----------

    : `<span class="tag warn">No configurada</span>`;

window.enterOrgAsSuper=async(i)=>{

  // Ningún dato de una org puede sobrevivir al cambio a otra.
  ORG_EPOCH++; // cierra la puerta a cualquier fetch en vuelo de la org anterior (guardia de época)

window.exitSuperView=async()=>{
