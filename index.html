// ---------- Panel de calibración (auto-carga en sombra, Fase A) ----------
let SHADOW=null, SHADOW_LOADING=false, KPI_CFG=null;
async function loadShadow(){
  if(SHADOW_LOADING) return; SHADOW_LOADING=true;
  const epoch=ORG_EPOCH; // capturada antes del 1er await, con ME.org_id de la org actual ya fijado en la query
  const desde=dstr(new Date(Date.now()-14*86400000));
  const [sm,kc]=await Promise.all([
    sb.from('st_shadow_metrics').select('*').eq('org_id',ME.org_id).gte('metric_date',desde),
    sb.from('st_kpi_config').select('*').eq('org_id',ME.org_id),
  ]);
  SHADOW_LOADING=false;
  if(epoch!==ORG_EPOCH) return; // la org cambió mientras esperábamos: son datos de la org vieja
  SHADOW=sm.data||[]; KPI_CFG=kc.data||[];
  if(state.view==='team') renderTeam();
}
// Recap del día: resumen legible por miembro de lo que midió el motor HOY,
// con las diferencias contra lo cargado a mano marcadas.
function recapHoy(){
  const hoy=todayStr();
  const rows=(SHADOW||[]).filter(r=>r.metric_date===hoy);
  const byMember={};
  rows.forEach(r=>{ (byMember[r.member_id]=byMember[r.member_id]||[]).push(r); });
  const miembros=DB.members||[];
  if(!miembros.length) return `<p style="color:var(--muted);font-size:13px;margin:0 0 12px">No hay miembros comerciales en el equipo todavía.</p>`;
  let html='';
  // Una fila por CADA miembro del equipo — tengan actividad o no.
  miembros.forEach(m=>{
    const rs=byMember[m.id]||[];
    const conAlgo=rs.filter(r=>+r.auto_value>0 || (r.manual_value!=null && +r.manual_value!==+r.auto_value));
    const diffs=rs.filter(r=>r.manual_value!=null && +r.manual_value!==+r.auto_value);
    let detalle, chip='';
    if(!rs.length){ detalle=`<span style="color:var(--muted)">sin datos del motor todavía</span>`; }
    else if(!conAlgo.length){ detalle=`<span style="color:var(--muted)">sin actividad medida hoy</span>`; chip=`<span class="cuo-est paga">sin diferencias</span>`; }
    else {
      detalle=conAlgo.map(r=>{
        const mismatch=r.manual_value!=null && +r.manual_value!==+r.auto_value;
        const cs=Array.isArray(r.contacts)?r.contacts:[];
        const rid=`rc_${esc(m.id)}_${esc(r.kpi)}`;
        const chip=`<span class="chip" ${cs.length?`onclick="toggleRecapContacts('${rid}')" `:''}style="${cs.length?'cursor:pointer;':''}${mismatch?'border-color:#ff6b6b;color:#ff6b6b':''}">${esc(r.kpi)}: <b>${+r.auto_value}</b>${r.manual_value!=null?` / manual ${+r.manual_value}`:''}${cs.length?' ▾':''}</span>`;
        const panel=cs.length?`<div id="${rid}" class="rc-panel" style="display:none;flex-basis:100%;margin:4px 0 10px;border:1px solid var(--line);border-radius:8px;overflow:hidden">${cs.map((c,i)=>{const label=`${esc(c.name)}${c.count?` <span style="color:var(--muted)">×${c.count}</span>`:''}`;const row=`display:flex;justify-content:space-between;align-items:center;gap:12px;padding:8px 12px;font-size:13px${i?';border-top:1px solid var(--line)':''}`;return GHL_LOC?`<a href="https://app.mazefunnels.com/v2/location/${esc(GHL_LOC)}/contacts/detail/${esc(c.id)}" target="_blank" rel="noopener" style="${row};text-decoration:none;color:inherit"><span>${label}</span><span style="opacity:.5">🔗</span></a>`:`<div style="${row};color:var(--muted)"><span>${label}</span></div>`;}).join('')}</div>`:'';
        return chip+panel;
      }).join(' ');
      chip=diffs.length?`<span class="cuo-est venc">${diffs.length} diferencia${diffs.length>1?'s':''}</span>`:`<span class="cuo-est paga">sin diferencias</span>`;
    }
    html+=`<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(127,127,127,.1)">
      <b style="min-width:150px">${esc(m.name)} <span style="color:var(--muted);font-weight:400">· ${ROLE_LABEL[m.role]||m.role}</span></b>${detalle}${chip}
    </div>`;
  });
  const ultima=rows.map(r=>r.computed_at).sort().pop();
  const hora=ultima?new Date(ultima).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):'';
  return `<div style="margin-bottom:14px"><div style="color:var(--muted);font-size:12px;margin-bottom:8px">Recap de HOY (${hoy})${hora?` · última corrida ${hora}`:' · tocá "Recap del día" para generarlo'}</div>${html}</div>`;
}
function calibracionCard(){
  if(GHL_LOC===null) loadGhlLocation(); // para los links del desglose de contactos (re-render al llegar)
  if(SHADOW===null){ loadShadow(); return `<div class="section"><div class="eyebrow">Auto-carga (modo sombra)</div><p style="color:var(--muted);font-size:13px;margin:0">Cargando calibración…</p></div>`; }
  const cfgRow=(KPI_CFG||[]).find(k=>k.kpi==='_config');
  const doms=((cfgRow&&cfgRow.config&&cfgRow.config.booking_domains)||[]).join(', ');
  const nameOf=(id)=>{ const m=DB.members.find(x=>x.id===id); return m?m.name:'—'; };
  const byKpi={};
  SHADOW.forEach(r=>{ (byKpi[r.kpi]=byKpi[r.kpi]||[]).push(r); });
  let rows='';
  Object.keys(byKpi).sort().forEach(k=>{
    const rs=byKpi[k].sort((a,b)=>a.metric_date<b.metric_date?1:-1);
    const comparables=rs.filter(r=>r.manual_value!=null);
    const matches=comparables.filter(r=>+r.auto_value===+r.manual_value);
    const pct=comparables.length?Math.round(matches.length/comparables.length*100):null;
    let racha=0; for(const r of rs){ if(r.manual_value!=null && +r.auto_value===+r.manual_value) racha++; else break; }
    const ult=rs[0];
    const chip=pct===null?`<span class="cuo-est">sin datos manuales</span>`:(pct>=90?`<span class="cuo-est paga">${pct}% match</span>`:`<span class="cuo-est venc">${pct}% match</span>`);
    rows+=`<tr><td style="text-align:left">${esc(k)}</td><td style="text-align:left">${esc(nameOf(ult&&ult.member_id))}</td><td>${ult?ult.metric_date:'—'}</td><td>${ult?+ult.auto_value:'—'}</td><td>${ult&&ult.manual_value!=null?+ult.manual_value:'—'}</td><td>${chip}</td><td>${racha} días</td></tr>`;
  });
  if(!rows) rows=`<tr><td colspan="7" class="empty">Sin corridas todavía. Tocá "Correr ahora" para la primera.</td></tr>`;
  return `<div class="section"><div class="eyebrow">Auto-carga (modo sombra) ${info('El motor calcula cada KPI desde GHL y el tracker, y lo compara con lo cargado a mano. Nada se escribe en los contadores: esto es solo calibración. Cuando un KPI venga clavado varios días, en la Fase B vas a poder graduarlo a automático.')}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
      <button class="btn sm" onclick="runShadow()" id="shadowBtn">⟳ Recap del día</button>
      <input class="inp" style="max-width:340px" placeholder="Dominios de agenda (coma): agendar.mazefunnels.io" value="${esc(doms)}" onchange="setBookingDomains(this.value)" data-tip="Para contar los links de agenda que envía el setter.">
    </div>
    ${recapHoy()}
    <div class="rollup"><table>
      <thead><tr><th style="text-align:left">KPI</th><th style="text-align:left">Miembro</th><th>Último día</th><th>Auto</th><th>Manual</th><th>Match 14d</th><th>Racha</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
}
window.runShadow=async()=>{
  const btn=document.getElementById('shadowBtn'); if(btn){ btn.disabled=true; btn.textContent='Corriendo…'; }
  try{
    const {data:{session}}=await sb.auth.getSession();
    const r=await fetch('/api/shadow/run',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},body:JSON.stringify(superOrgBody({}))});
    const j=await r.json().catch(()=>null);
    if(!r.ok){ toast((j&&j.error)||'Falló la corrida'); }

// Trae los leads con cita reciente del calendario de admisión (vía mini-API → GHL).
// Fallback obligatorio: sin GHL (501/error/0 leads) la vista queda en modo manual
// — input de nombre visible y botón "Registrar venta" — sin toast de error:
// la ausencia de GHL es un estado normal, no una falla.
let GHL_LEADS=[];
async function loadGhlLeads(){
  const sel=document.getElementById('s_lead'); if(!sel) return;
  const epoch=ORG_EPOCH; // guardia de época: capturada antes del 1er await
  const manualMode=(showHint)=>{
    if(epoch!==ORG_EPOCH) return; // la org cambió mientras esperábamos: no tocar el estado de la org nueva
    GHL_LEADS=[];
    const lw=document.getElementById('s_lead_wrap'); if(lw) lw.style.display='none';
    const cw=document.getElementById('s_cliente_wrap'); if(cw) cw.style.display='';
    const btn=document.getElementById('s_submit'); if(btn) btn.textContent='Registrar venta';
    const h=document.getElementById('s_lead_hint'); if(h) h.style.display=showHint?'':'none';
  };
  let j=null;
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(epoch!==ORG_EPOCH) return;
    if(!session){ manualMode(false); return; }
    const r=await fetch('/api/ghl/leads'+(SUPER_HOME?('?org_id='+encodeURIComponent(ME.org_id)):''),{headers:{'Authorization':'Bearer '+session.access_token}});
    if(epoch!==ORG_EPOCH) return;
    if(!r.ok){ manualMode(true); return; }
    j=await r.json();
  }catch(e){ if(epoch===ORG_EPOCH) manualMode(true); return; }
  if(epoch!==ORG_EPOCH) return;
  if(!j || !j.leads || !j.leads.length){ manualMode(true); return; }
  GHL_LEADS=j.leads;
  const fmt=(c)=>{ const d=String(c.cita||'').slice(0,16).replace('T',' '); return `${c.name}${d?' · '+d:''}`; };
  sel.innerHTML = `<option value="">— Elegí el lead de la llamada —</option>`
    + GHL_LEADS.map(c=>`<option value="${esc(c.id)}">${esc(fmt(c))}</option>`).join('')
    + `<option value="__manual__">Otro (escribir a mano, sin GHL)</option>`;
  const lw=document.getElementById('s_lead_wrap'); if(lw) lw.style.display='';
  const cw=document.getElementById('s_cliente_wrap'); if(cw) cw.style.display='none';
  const btn=document.getElementById('s_submit'); if(btn) btn.textContent='Registrar venta y disparar onboarding';
}

window.addSale=async()=>{
  const g=(id)=>document.getElementById(id).value;
  const leadSel=g('s_lead');
  let cliente='', ghlId=null;
  if(leadSel && leadSel!=='__manual__'){
    const lead=GHL_LEADS.find(l=>l.id===leadSel);
    cliente=lead?lead.name:''; ghlId=leadSel;
  } else {
    cliente=(g('s_cliente')||'').trim();
  }
  if(!cliente){ toast('Elegí el lead o escribí el cliente'); return; }
  const fueReserva=!!g('s_reservaflag');
  const row={org_id:DB.team.id,sale_date:todayStr(),cliente,programa:g('s_programa')||'—',metodo:g('s_metodo')||'—',
    facturado:+g('s_fact')||0,cash:+g('s_cash')||0,cuotas:+g('s_cuotas')||1,reserva:+g('s_reserva')||0,
    primer_pago:+g('s_primerpago')||0,fue_reserva:fueReserva,ghl_contact_id:ghlId,
    closer_id:g('s_closer')||null,triage_id:g('s_triage')||null,setter_id:g('s_setter')||null,fuente:g('s_fuente')||'—',created_by:SUPER_HOME?null:ME.id};
  const {data,error}=await sb.from('st_sales').insert(row).select().single();
  if(error){ toast('No se pudo (permiso)'); return; }
  DB.sales.push({id:data.id,date:data.sale_date,cliente,programa:row.programa,metodo:row.metodo,facturado:row.facturado,cash:row.cash,cuotas:row.cuotas,reserva:row.reserva,closer:row.closer_id,triage:row.triage_id,setter:row.setter_id,fuente:row.fuente});

  // Cierre del ciclo en GHL (best-effort): custom fields + tag de onboarding + oportunidad + Slack.
  if(ghlId){
    try{
      const closer=DB.members.find(m=>m.id===row.closer_id);
      const {data:{session}}=await sb.auth.getSession();
      const r=await fetch('/api/sales/ghl',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
        body:JSON.stringify(superOrgBody({contactId:ghlId,clienteNombre:cliente,programa:row.programa,facturado:row.facturado,cash:row.cash,
          cuotas:row.cuotas,metodo:row.metodo,fueReserva:fueReserva,reserva:row.reserva,primerPago:row.primer_pago,
          vendedor:closer?closer.name:''}))});
      const j=await r.json();
      if(j.ok){ toast(fueReserva?'Reserva registrada — tag "reserva" aplicado 🔒':'Venta registrada — onboarding disparado 🎉'); }
      else { toast('Venta guardada, pero GHL falló: revisá el contacto'); }
    }catch(e){ toast('Venta guardada, pero GHL falló: revisá el contacto'); }
  } else {
    toast('Venta registrada');
  }
  renderSales();
};
window.delSale=async(id)=>{ const {error}=await sb.from('st_sales').delete().eq('id',id); if(error){ toast('No se pudo'); return; } DB.sales=DB.sales.filter(s=>s.id!==id); DB.cuotas=(DB.cuotas||[]).filter(c=>c.sale_id!==id); renderSales(); };

// registrar una venta, así que el estado local queda viejo hasta este fetch).
let _cuoRefreshing=false;
async function refreshCuotas(){
  if(_cuoRefreshing||!ME) return;
  _cuoRefreshing=true;
  try{
    const fresh=(await sb.from('st_cuotas').select('*').eq('org_id',ME.org_id)).data;

      const mapped=fresh.map(c=>({id:c.id,sale_id:c.sale_id,numero:c.numero,monto:+c.monto,due_date:c.due_date,status:c.status,paid_date:c.paid_date,paid_amount:c.paid_amount==null?null:+c.paid_amount}));

function moneyFull(n){ return '$'+(+n||0).toLocaleString('es'); }
function cuotaEstado(c){ if(c.status==='pagada') return 'pagada'; return c.due_date<todayStr()?'vencida':'pendiente'; }
// Pacing de la meta de caja: SIEMPRE sobre el mes calendario en curso,
// sin importar el selector de período de la vista (la meta es mensual).
function metaCajaBlock(){
  const meta=+((DB.goals.month||{}).caja)||0;
  if(!meta) return '';
  const rm=range('month', parseD(todayStr()));
  const inM=(d)=>d>=rm.start&&d<=rm.end;
  const front=DB.sales.filter(s=>inM(s.date)).reduce((a,s)=>a+(+s.cash||0)+(+s.reserva||0),0);
  const back=(DB.cuotas||[]).filter(c=>c.status==='pagada'&&c.paid_date&&inM(c.paid_date)).reduce((a,c)=>a+(+c.paid_amount||0),0);
  const cobrado=front+back;
  const today=parseD(todayStr());
  const diasMes=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const rest=diasMes-today.getDate();
  const pctReal=cobrado/meta*100;
  const pct=Math.min(100,Math.round(pctReal));
  const pctMes=today.getDate()/diasMes*100;
  const done=cobrado>=meta;
  const chip=done?`<span class="cuo-est paga">Meta cumplida 🎉</span>`:(pctReal>=pctMes?`<span class="cuo-est paga">Adelantado</span>`:`<span class="cuo-est venc">Atrasado</span>`);
  const ritmo=done?'':` · necesitás ${moneyFull(Math.ceil((meta-cobrado)/Math.max(rest,1)))}/día`;
  return `<div class="section"><div class="eyebrow">Meta de caja · ${MONTHS[today.getMonth()]} ${today.getFullYear()} ${info('Cobrado del mes (front + back) contra la meta fijada en Metas. Adelantado/Atrasado compara tu % cobrado con el % del mes ya transcurrido.')}</div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px">
      <b style="font-size:18px">${moneyFull(cobrado)}</b><span style="color:var(--muted)">de ${moneyFull(meta)} · ${pct}%${done?'':` · quedan ${rest} días`}${ritmo}</span>${chip}
    </div>
    <div style="height:10px;border-radius:20px;background:rgba(127,127,127,.18);overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--accent,#C5FF49)"></div></div>
  </div>`;
}
// Solo con la base 'cobrado': desglose de comisiones por closer del período visible.
function comisionesBlock(r){
  if((DB.team.commission_base||'contador')!=='cobrado') return '';
  const closers=membersByRole('closer').filter(m=>(+m.commission||0)>0);
  if(!closers.length) return '';
  let rows='';
  closers.forEach(m=>{
    const b=closerPayoutBase(m.id, r.start, r.end);
    rows+=`<tr><td style="text-align:left">${esc(m.name)}</td><td>${moneyFull(b.front)}</td><td>${moneyFull(b.back)}</td><td>${m.commission}%</td><td><b>${moneyFull(Math.round(m.commission/100*b.base))}</b></td></tr>`;
  });
  return `<div class="section"><div class="eyebrow">Comisiones del período ${info('Base "cobrado": front (cash+reservas de sus ventas) + back (cuotas cobradas, por fecha de cobro) × su % de comisión.')}</div>
    <div class="rollup"><table>
      <thead><tr><th style="text-align:left">Closer</th><th>Front</th><th>Back</th><th>%</th><th>A cobrar</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
}
function renderCaja(){
  const cuotas=DB.cuotas||[];
  const r=range(state.ptype, parseD(state.ref));
  const inR=(d)=>d>=r.start&&d<=r.end;
  const front=DB.sales.filter(s=>inR(s.date)).reduce((a,s)=>a+(+s.cash||0)+(+s.reserva||0),0);
  const back=cuotas.filter(c=>c.status==='pagada'&&c.paid_date&&inR(c.paid_date)).reduce((a,c)=>a+(+c.paid_amount||0),0);
  const calle=cuotas.filter(c=>c.status!=='pagada').reduce((a,c)=>a+(+c.monto||0),0);
  const today=parseD(todayStr());
  let proj='';
  for(let k=0;k<3;k++){
    const m0=new Date(today.getFullYear(),today.getMonth()+k,1), m1=new Date(today.getFullYear(),today.getMonth()+k+1,0);
    const a=dstr(m0), b=dstr(m1);
    const tot=cuotas.filter(c=>c.status!=='pagada'&&c.due_date>=a&&c.due_date<=b).reduce((x,c)=>x+(+c.monto||0),0);
    proj+=mini(MONTHS[m0.getMonth()]+' '+m0.getFullYear(), moneyFull(tot));
  }
  const saleOf=(id)=>DB.sales.find(s=>s.id===id)||{};
  const q=(state.cajaQ||'').toLowerCase(), f=state.cajaF||'abiertas';
  let list=cuotas.map(c=>({...c,est:cuotaEstado(c),sale:saleOf(c.sale_id)}));
  if(f==='abiertas') list=list.filter(c=>c.est!=='pagada');
  else if(f!=='todas') list=list.filter(c=>c.est===f);
  if(q) list=list.filter(c=>String(c.sale.cliente||'').toLowerCase().includes(q));
  list.sort((a,b)=>a.due_date<b.due_date?-1:1);
  const EST={pendiente:'<span class="cuo-est">Pendiente</span>',vencida:'<span class="cuo-est venc">Vencida</span>',pagada:'<span class="cuo-est paga">Pagada</span>'};
  let rows='';
  list.forEach(c=>{
    const s=c.sale;
    const ghlBtn=(s.ghl&&GHL_LOC)
      ?`<a class="btn ghost sm" href="https://app.mazefunnels.com/v2/location/${esc(GHL_LOC)}/contacts/detail/${esc(s.ghl)}" target="_blank" rel="noopener" title="Abrir contacto en GHL">💬</a>`
      :(s.ghl?'':`<span style="color:var(--muted);font-size:11px">sin contacto GHL</span>`);
    const acts=(IS_ADMIN&&c.status!=='pagada')
      ?`<button class="btn sm" onclick="openCobrarModal('${c.id}')">Cobrar</button> <button class="btn ghost sm" onclick="openEditCuotaModal('${c.id}')" title="Editar monto o fecha">✎</button>`
      :(c.status==='pagada'?`<span style="color:var(--muted);font-size:11px">${c.paid_date||''}</span>`:'');
    rows+=`<tr><td style="text-align:left">${esc(s.cliente||'—')}</td><td style="text-align:left">${esc(s.programa||'—')}</td><td>${c.numero}/${Math.max(+s.cuotas||0,c.numero)}</td><td>${moneyFull(c.status==='pagada'?c.paid_amount:c.monto)}</td><td>${c.due_date}</td><td>${EST[c.est]}</td><td>${ghlBtn}</td><td>${acts}</td></tr>`;
  });
  if(!rows) rows=`<tr><td colspan="8" class="empty">No hay cuotas en este filtro.</td></tr>`;
  const FL={abiertas:'Abiertas',pendiente:'Pendientes',vencida:'Vencidas',pagada:'Pagadas',todas:'Todas'};
  const filtros=Object.keys(FL).map(x=>`<button class="chip" style="${f===x?'border-color:var(--accent,#C5FF49);color:var(--accent,#C5FF49)':''}" onclick="setCajaF('${x}')">${FL[x]}</button>`).join('');
  VIEW.innerHTML = topbar(periodControls()) + `<div class="eyebrow">Caja</div><h2 class="view">Cash del front, cuotas del back</h2>
    ${adminNotice()}
    ${metaCajaBlock()}
    <div class="cards-mini section">
      ${mini('Caja front '+info('Cash collected + reservas de las ventas del período (por fecha de venta).'),moneyFull(front))}
      ${mini('Caja back '+info('Cuotas cobradas en el período (por fecha real de cobro).'),moneyFull(back))}
      ${mini('Total período',moneyFull(front+back))}
      ${mini('En la calle '+info('Todo lo pendiente de cobro, de todos los tiempos: cuotas pendientes + vencidas.'),moneyFull(calle))}
    </div>
    <div class="section"><div class="eyebrow">Proyección de cobros ${info('Lo que debería entrar según las cuotas agendadas, mes por mes.')}</div>
      <div class="cards-mini">${proj}</div></div>
    ${comisionesBlock(r)}
    <div class="section"><div class="eyebrow">Cuotas</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
        ${filtros}
        <input class="inp" style="max-width:220px;margin-left:auto" placeholder="Buscar cliente…" value="${esc(state.cajaQ||'')}" oninput="setCajaQ(this.value)">
      </div>
      <div class="rollup"><table>
        <thead><tr><th style="text-align:left">Cliente</th><th style="text-align:left">Programa</th><th>Cuota</th><th>Monto</th><th>Vence</th><th>Estado</th><th>GHL</th><th></th></tr></thead>
        <tbody>${rows}</tbody></table></div></div>` + footer();
  loadGhlLocation();
  refreshCuotas();
}

window.submitCobro=async(ev,id)=>{
  ev.preventDefault();
  const amount=+document.getElementById('cu_amount').value||0;
  const date=document.getElementById('cu_date').value;
  if(amount<=0||!date){ toast('Monto y fecha son obligatorios'); return false; }
  const btn=document.getElementById('cu_btn'); if(btn){ btn.disabled=true; btn.textContent='Guardando…'; }
  const {error}=await sb.from('st_cuotas').update({status:'pagada',paid_amount:amount,paid_date:date}).eq('id',id);
  if(error){ toast('No se pudo (permiso)'); if(btn){ btn.disabled=false; btn.textContent='Registrar cobro'; } return false; }
  const c=(DB.cuotas||[]).find(x=>x.id===id); if(c){ c.status='pagada'; c.paid_amount=amount; c.paid_date=date; }
  save(); closeCuotaModal(); toast('Cobro registrado 💰'); renderCaja();
  return false;
};

window.submitEditCuota=async(ev,id)=>{
  ev.preventDefault();
  const monto=+document.getElementById('ce_amount').value||0;
  const due=document.getElementById('ce_date').value;
  if(monto<=0||!due){ toast('Monto y fecha son obligatorios'); return false; }
  const btn=document.getElementById('ce_btn'); if(btn){ btn.disabled=true; btn.textContent='Guardando…'; }
  const {error}=await sb.from('st_cuotas').update({monto,due_date:due}).eq('id',id);
  if(error){ toast('No se pudo (permiso)'); if(btn){ btn.disabled=false; btn.textContent='Guardar'; } return false; }

  save(); closeCuotaModal(); toast('Cuota actualizada'); renderCaja();
  return false;
};

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function info(tip){ return `<span class="info" data-tip="${esc(tip)}">i</span>`; }
function adminNotice(){ return IS_ADMIN ? '' : '<div class="admin-lock">🔒 <span>Solo el admin puede editar esta sección. Puedes ver los datos del equipo, pero no modificarlos.</span></div>'; }
function footer(){ return `<div class="footnote">
  <span>Maze Sales Tracker IA · v1 funcional</span><span class="dot2"></span>
  <span>Datos guardados en este navegador</span><span class="dot2"></span>
  <a href="https://github.com/mazeos/maze-sales-tracker" target="_blank" rel="noopener">repo</a></div>`; }
let toastT;
function toast(msg,ms){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),ms||1800); }

// ---------- tooltip global (sobre body, escapa overflow) ----------
(function(){
  const box=document.createElement('div'); box.className='tipbox'; document.body.appendChild(box);
  let cur=null;
  function place(t){
    const r=t.getBoundingClientRect(); box.style.display='block';
    const b=box.getBoundingClientRect();
    let top=r.top-b.height-9, left=r.left+r.width/2-b.width/2;
    if(top<8) top=r.bottom+9;
    left=Math.max(8, Math.min(left, window.innerWidth-b.width-8));
    box.style.top=top+'px'; box.style.left=left+'px';
  }
  document.addEventListener('mouseover',e=>{ const t=e.target.closest?e.target.closest('[data-tip]'):null; if(t){ cur=t; box.textContent=t.getAttribute('data-tip'); place(t); } });
  document.addEventListener('mouseout',e=>{ const t=e.target.closest?e.target.closest('[data-tip]'):null; if(t&&t===cur){ box.style.display='none'; cur=null; } });
  document.addEventListener('scroll',()=>{ if(cur){ box.style.display='none'; cur=null; } }, true);
})();

// ---------- init ----------
// Modo embebido: el tracker corre dentro de una Custom Page de GHL (?embed).
const EMBED = new URLSearchParams(location.search).has('embed');
// Handshake SSO con GHL: pide los datos del usuario al iframe padre, los canjea
// por un magic link en la mini-API y abre sesión sin contraseña. Devuelve true
// si logró loguear (el caller reintenta boot); false si no hay respuesta a tiempo.
function ssoFromGhl(){
  return new Promise((resolve)=>{
    let done=false;
    const finish=(ok)=>{ if(done) return; done=true; window.removeEventListener('message',onMsg); clearTimeout(t); resolve(ok); };
    const onMsg=async(e)=>{
      const d=e.data||{};
      if(d.message!=='REQUEST_USER_DATA_RESPONSE' || !d.payload) return;
      try{
        const r=await fetch('/api/sso/ghl',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({payload:d.payload})});
        const j=await r.json().catch(()=>null);
        if(!r.ok || !j || !j.token_hash){ finish(false); return; }
        const {error}=await sb.auth.verifyOtp({type:'magiclink',token_hash:j.token_hash});
        finish(!error);
      }catch(err){ finish(false); }
    };
    window.addEventListener('message',onMsg);
    window.parent.postMessage({message:'REQUEST_USER_DATA'},'*');
    var t=setTimeout(()=>finish(false),6000);
  });
}
async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){
    // En GHL: intentar SSO antes de mostrar el login manual.
    if(EMBED){ const ok=await ssoFromGhl(); if(ok){ boot(); return; } }
    renderLogin(); return;
  }
  // Multi-cuenta: un login puede tener perfiles en varias orgs.
  const {data:allProfs}=await sb.from('st_profiles').select('*').eq('user_id',session.user.id);
  MY_PROFILES=(allProfs||[]).filter(p=>p.active!==false);
  if(!MY_PROFILES.length){ await sb.auth.signOut(); renderLogin('Tu cuenta no está habilitada en ningún equipo.'); return; }
  let prof=MY_PROFILES[0];
  if(MY_PROFILES.length>1){
    const {data:st}=await sb.from('st_user_state').select('active_profile_id').eq('user_id',session.user.id).maybeSingle();
    const activo=st&&MY_PROFILES.find(p=>p.id===st.active_profile_id);
    if(activo){ prof=activo; }
    else { await showTeamPicker(session.user.id); return; } // elige y recarga
  }
  ME={id:prof.id,role:prof.role,name:prof.name,org_id:prof.org_id}; IS_ADMIN=prof.role==='admin';
  // Detección super-admin (un único fetch tras el login): 200 en
  // /api/platform/settings = super-admin → se muestra el ítem Plataforma.
  // Cualquier otro status o error de red → queda oculto, silencioso
  // (fail-closed, mismo espíritu que ORGS_ALLOWED). Best-effort: no bloquea el boot.
  fetch('/api/platform/settings',{headers:{'Authorization':'Bearer '+session.access_token}})
    .then(async (res)=>{
      if(!res.ok) return;
      const data=await res.json().catch(()=>null);
      if(!data) return;
      IS_SUPER=true; PLAT_SETTINGS=data;
      // Mostrar el ítem Plataforma ANTES de render(): si render() llegara a lanzar
      // (estado a medio cargar), el ícono igual queda visible. Antes iba después
      // del render y un error async lo dejaba oculto (lo tragaba el .catch).
      const nav=document.getElementById('nav-platform'); if(nav) nav.style.display='';
      // Super-admin = permisos totales en cualquier equipo (la RLS lo respalda vía st_is_super()).
      if(!IS_ADMIN){ IS_ADMIN=true; render(); }
    })
    .catch(()=>{ /* fail-closed: el ítem queda oculto */ });
  // Retorno del flujo OAuth de GHL (query params que deja el callback de la mini-API).
  const qs=new URLSearchParams(location.search);
  if(qs.get('ghl')==='connected'){
    toast('HighLevel conectado ✅');
    history.replaceState(null,'',location.pathname);
  } else if(qs.get('ghl_error')==='location_mismatch'){
    GHL_MISMATCH=true;
    toast('Autorizaste otra subcuenta de HighLevel');
    history.replaceState(null,'',location.pathname);
  } else if(qs.get('ghl_error')){
    toast(qs.get('ghl_error')==='state' ? 'El enlace expiró, intentá conectar de nuevo' : 'No se pudo conectar con HighLevel');
    history.replaceState(null,'',location.pathname);
  }
  await loadFromSupabase();
  state.capMember = IS_ADMIN ? (DB.members[0]&&DB.members[0].id) : ME.id;
  state.tblMember = state.capMember;
  document.getElementById('loginOv') && (document.getElementById('loginOv').style.display='none');
  document.querySelector('.app').style.display='';
  render();
}
function renderLogin(msg){
  document.querySelector('.app').style.display='none';
  let ov=document.getElementById('loginOv'); if(!ov){ ov=document.createElement('div'); ov.id='loginOv'; document.body.appendChild(ov); }
  ov.style.cssText='position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(900px 600px at 80% -10%,rgba(108,92,231,.18),transparent 60%),var(--onyx)';
  ov.innerHTML=`<form onsubmit="return doLogin(event)" style="width:100%;max-width:360px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:30px 28px;box-shadow:0 30px 90px rgba(0,0,0,.5)">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:18px"><div class="brand" style="width:34px;height:34px;margin:0"><svg viewBox="0 0 24 24" fill="none" stroke="#C5FF49" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V7l9-4 9 4v14"/><path d="M8 21v-6h8v6"/></svg></div><b style="font-family:Fraunces,serif;font-weight:500;font-size:18px">Maze Sales Tracker</b></div>
    <h2 style="font-family:Fraunces,serif;font-weight:500;font-size:21px;margin-bottom:4px">Entrá a tu cuenta</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:18px">Cargá y mirá los números de tu equipo.</p>
    ${msg?`<div style="background:rgba(242,85,90,.1);border:1px solid rgba(242,85,90,.3);color:var(--danger);font-size:12.5px;padding:9px 11px;border-radius:9px;margin-bottom:12px">${esc(msg)}</div>`:''}
    <input class="inp" id="lg_email" type="email" placeholder="Email" autocomplete="username" required style="margin-bottom:10px">
    <input class="inp" id="lg_pass" type="password" placeholder="Contraseña" autocomplete="current-password" required style="margin-bottom:16px">
    <button class="btn" type="submit" id="lg_btn" style="width:100%">Entrar</button>
    <div id="lg_hint" style="color:var(--danger);font-size:12.5px;margin-top:10px;min-height:16px"></div>
  </form>`;
  ov.style.display='flex';
}
window.doLogin=async(ev)=>{ ev.preventDefault();
  const email=document.getElementById('lg_email').value.trim(), pass=document.getElementById('lg_pass').value;
  const btn=document.getElementById('lg_btn'); btn.textContent='Entrando…'; btn.disabled=true;
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){ document.getElementById('lg_hint').textContent='Email o contraseña incorrectos.'; btn.textContent='Entrar'; btn.disabled=false; return false; }
  await boot(); return false;
};
window.doLogout=async()=>{ await sb.auth.signOut(); location.reload(); };
boot();
</script>
