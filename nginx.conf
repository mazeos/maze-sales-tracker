server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        # No cachear el HTML: el navegador siempre revalida y trae la última versión.
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}
