server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        # No cachear el HTML: el navegador siempre revalida y trae la última versión.
        add_header Cache-Control "no-cache, must-revalidate" always;
        # Permitir que el tracker se embeba en el iframe de GHL (Custom Page) y en
        # el dominio white-label de la agencia. frame-ancestors reemplaza a
        # X-Frame-Options; sin esto el navegador bloquea el iframe dentro de GHL.
        add_header Content-Security-Policy "frame-ancestors 'self' https://app.gohighlevel.com https://*.gohighlevel.com https://app.mazefunnels.com https://*.mazefunnels.com https://*.mazefunnels.io;" always;
    }

    # Proxy hacia la mini-API de provisioning de miembros (mismo origen, sin CORS).
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
}
